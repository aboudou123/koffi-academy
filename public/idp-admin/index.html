  </main>
</div>
<div class="toast" id="toast"><i class="fa-solid fa-circle-check"></i><span id="toastText">Saved</span></div>

<script>

  dataSources:{label:"Data Sources",singular:"Data source",icon:"fa-database",store:"dataSources",api:"/api/idp/data-sources",description:"Integrations that feed the IDP data model.",fields:[["name","Name","text","GitHub"],["ingestedData","Ingested data","textarea","Code, PRs, ownership files"],["volume","Volume","text","32 repos"],["frequency","Frequency","text","Webhook + hourly sync"],["status","Status","select","",["ok","warn","bad"]]],columns:[["name","Source","entity"],["ingestedData","Ingested data"],["volume","Volume"],["frequency","Frequency"],["status","Status","badge"]]},

};
var VIEWS=[["overview","fa-chart-line","Overview"],["runs","fa-play","Run Workflow"],["audit","fa-clipboard-list","Audit Log"],["model","fa-code","Store JSON"]];
var state={store:null,view:"overview",resource:"services",editing:null,query:"",secret:localStorage.getItem("idpAdminSecret")||"koffi-admin",connected:false,lastSync:null};
var els={};
function $(id){return document.getElementById(id)}
function esc(value){return String(value==null?"":value).replace(/[&<>"']/g,function(ch){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]})}

/* ── Persistent store: real backend if reachable, else localStorage (browser) ── */

function lsLoad(){try{return JSON.parse(localStorage.getItem(LS_KEY)||"null")}catch(e){return null}}
function lsSave(s){try{localStorage.setItem(LS_KEY,JSON.stringify(s))}catch(e){}}

    {id:"svc-auth",name:"auth-gateway",owner:"Security",tier:"Tier 0",runtime:"Kubernetes",score:95,status:"ok",repo:"github.com/koffi/auth-gateway",description:"Identity & access"},

  dataSources:[

    {id:"ds-k8s",name:"Kubernetes",ingestedData:"Deployments, workloads",volume:"8 clusters",frequency:"Exporter",status:"ok"},

  teams:[

    {id:"t-payments",name:"Payments",domain:"Checkout & billing",manager:"J. Müller",costCenter:"ENG-210"},

function ensureStore(){var s=lsLoad();var seed=seedStore();if(!s||typeof s!=="object"){s=seed}else{Object.keys(seed).forEach(function(k){if(s[k]===undefined)s[k]=seed[k]})}lsSave(s);return s}

function localApi(path,options){
  var s=ensureStore();var method=(options.method||"GET").toUpperCase();
  if(path==="/api/idp/store")return s;
  var m=path.match(/^\/api\/idp\/([a-z-]+)(?:\/(.+))?$/);if(!m)throw new Error("Unknown endpoint");
  var key=RES_STORE[m[1]];if(!key)throw new Error("Unknown resource");
  var id=m[2]?decodeURIComponent(m[2]):null;s[key]=s[key]||[];

async function load(){try{state.store=await api("/api/idp/store");state.lastSync=new Date();setConnected(true);renderNav();render()}catch(error){setConnected(false);toast(error.message);if(!state.store)renderOffline()}}
function counts(){var s=state.store||{};return {services:(s.services||[]).length,dataSources:(s.dataSources||[]).length,teams:(s.teams||[]).length,agents:(s.agents||[]).length,workflows:(s.workflows||[]).length,runs:(s.workflowRuns||[]).length,audit:(s.auditLogs||[]).length}}
function renderNav(){var c=counts();var html='<div class="nav-title">Operate</div>';VIEWS.forEach(function(v){var count=v[0]==="runs"?c.runs:v[0]==="audit"?c.audit:"";html+='<button class="nav-btn '+(state.view===v[0]?"active":"")+'" data-view="'+v[0]+'"><i class="fa-solid '+v[1]+'"></i><span>'+v[2]+'</span>'+(count!==""?'<span class="nav-count">'+count+'</span>':'')+'</button>'});html+='<div class="nav-title">Resources</div>';Object.keys(RESOURCES).forEach(function(key){var r=RESOURCES[key];html+='<button class="nav-btn '+(state.view==="resource"&&state.resource===key?"active":"")+'" data-resource="'+key+'"><i class="fa-solid '+r.icon+'"></i><span>'+r.label+'</span><span class="nav-count">'+(c[key]||0)+'</span></button>'});els.mainNav.innerHTML=html}
function setTitle(title,subtitle){els.viewTitle.textContent=title;els.viewSubtitle.textContent=subtitle}
function filteredRows(key){var rows=list(RESOURCES[key].store);var q=state.query.trim().toLowerCase();if(!q)return rows;return rows.filter(function(row){return JSON.stringify(row).toLowerCase().includes(q)})}
function metric(label,value,detail,icon){return '<div class="metric"><span><i class="fa-solid '+icon+'"></i> '+label+'</span><strong>'+value+'</strong><small>'+detail+'</small></div>'}
function renderOverview(){setTitle("IDP Control Center","A real control surface for catalog, ownership, automation and audit data.");var c=counts();var services=list("services");var sources=list("dataSources");var score=services.length?Math.round(services.reduce(function(sum,item){return sum+Number(item.score||0)},0)/services.length):0;var risks=services.filter(function(item){return item.status==="bad"||Number(item.score||0)<75}).length+sources.filter(function(item){return item.status!=="ok"}).length;var runs=list("workflowRuns").slice(0,5);var audit=list("auditLogs").slice(0,6);els.content.innerHTML='<div class="hero"><div><h2>Backend governance workspace</h2><p>Manage the IDP model from one professional console: catalog objects, teams, agents, workflows, runs and audit events. Changes are persisted in the backend store and reflected in the portal.</p></div><div class="hero-meta"><span class="chip '+(state.connected?"ok":"warn")+'"><i class="fa-solid fa-circle"></i>'+(state.connected?(USING_LOCAL?"Local store (browser)":"Backend live"):"Static/offline")+'</span><span class="chip"><i class="fa-regular fa-clock"></i>'+(state.lastSync?state.lastSync.toLocaleTimeString():"Not synced")+'</span></div></div><div class="grid cols-4">'+metric("Services",c.services,"Catalog entities","fa-cubes")+metric("Avg score",score+"%","Readiness average","fa-chart-line")+metric("Teams",c.teams,"Ownership boundaries","fa-users")+metric("Open risks",risks,"Needs review","fa-triangle-exclamation")+metric("Agents",c.agents,"Governed AI actors","fa-robot")+metric("Workflows",c.workflows,"Launchable actions","fa-diagram-project")+metric("Runs",c.runs,"Execution records","fa-play")+metric("Audit",c.audit,"Immutable events","fa-clipboard-list")+'</div><div class="grid cols-2"><div class="panel"><div class="panel-head"><div><h3>Recent workflow runs</h3><p>Latest backend executions</p></div><button class="btn btn-light" data-view-jump="runs">Open</button></div><div class="panel-body">'+timeline(runs,"workflow")+'</div></div><div class="panel"><div class="panel-head"><div><h3>Audit activity</h3><p>Latest persisted changes</p></div><button class="btn btn-light" data-view-jump="audit">Open</button></div><div class="panel-body">'+timeline(audit,"audit")+'</div></div></div>'}
function timeline(rows,type){if(!rows.length)return '<div class="empty"><i class="fa-regular fa-circle"></i>No records yet.</div>';return '<div class="hint-list">'+rows.map(function(row){var title=type==="audit"?(row.action+" / "+row.entity):row.workflow;var desc=type==="audit"?row.details:((row.target||"target")+" - "+(row.context||row.owner||"workflow run"));var stamp=type==="audit"?row.at:row.createdAt;return '<div class="hint-item"><div class="hint-icon"><i class="fa-solid '+(type==="audit"?"fa-clipboard-list":"fa-play")+'"></i></div><div><h4>'+esc(title)+'</h4><p>'+esc(desc||"")+'</p></div><time>'+esc(stamp?new Date(stamp).toLocaleTimeString():"")+'</time></div>'}).join("")+'</div>'}
function renderResource(key){var r=RESOURCES[key];state.resource=key;setTitle(r.label,r.description);var rows=filteredRows(key);els.content.innerHTML='<div class="hero"><div><h2>'+r.label+'</h2><p>'+r.description+'</p></div><div class="hero-meta"><span class="chip"><i class="fa-solid '+r.icon+'"></i>'+rows.length+' shown</span><span class="chip ok"><i class="fa-solid fa-database"></i>Backend controlled</span></div></div><div class="split"><div class="panel"><div class="panel-head"><div><h3>'+r.label+' registry</h3><p>Select an item to edit it, or create a new one.</p></div><button class="btn btn-primary" data-new="'+key+'"><i class="fa-solid fa-plus"></i>New '+r.singular+'</button></div><div class="panel-body"><div class="toolbar"><div class="inline-tools"><label class="mini-search"><i class="fa-solid fa-magnifying-glass"></i><input data-local-search placeholder="Filter '+r.label.toLowerCase()+'" value="'+esc(state.query)+'"></label></div><span class="chip">'+rows.length+' / '+list(r.store).length+'</span></div>'+resourceTable(key,rows)+'</div></div><aside class="panel editor"><div class="panel-head"><div><h3>'+editorTitle(key)+'</h3><p>'+editorSubtitle(key)+'</p></div></div><div class="panel-body">'+editorForm(key)+'</div></aside></div>'}
function resourceTable(key,rows){var r=RESOURCES[key];if(!rows.length)return '<div class="empty"><i class="fa-solid fa-table"></i>No matching records.</div>';var head='<thead><tr>'+r.columns.map(function(c){return '<th>'+c[1]+'</th>'}).join("")+'<th>Actions</th></tr></thead>';var body='<tbody>'+rows.map(function(row){return '<tr>'+r.columns.map(function(c){return '<td>'+cell(row,c)+'</td>'}).join("")+'<td><div class="row-actions"><button class="row-btn" data-edit="'+key+'" data-id="'+esc(row.id)+'" title="Edit"><i class="fa-solid fa-pen"></i></button><button class="row-btn" data-delete="'+key+'" data-id="'+esc(row.id)+'" title="Delete"><i class="fa-solid fa-trash"></i></button></div></td></tr>'}).join("")+'</tbody>';return '<div class="table-wrap"><table>'+head+body+'</table></div>'}
function cell(row,c){var value=row[c[0]];if(c[2]==="entity")return '<div class="entity"><strong>'+esc(value)+'</strong><small>'+esc(row.description||row.scope||row.repo||row.domain||row.category||"")+'</small></div>';if(c[2]==="badge")return badge(value);if(c[2]==="score"){var n=Number(value||0);var cls=n<75?"bad":n<84?"warn":"ok";return '<div class="score"><span class="bar '+cls+'"><span style="width:'+Math.max(0,Math.min(100,n))+'%"></span></span><strong>'+n+'</strong></div>'}return esc(value)}
function editorTitle(key){if(!state.editing)return "Editor";return (state.editing.mode==="new"?"Create ":"Edit ")+RESOURCES[key].singular}
function editorSubtitle(key){return state.editing?"Changes are written to "+RESOURCES[key].api:"Select a row or create a new item."}
function editorForm(key){if(!state.editing)return '<div class="empty"><i class="fa-solid fa-arrow-pointer"></i>Select a row to edit, or create a new '+RESOURCES[key].singular.toLowerCase()+'.</div>';var r=RESOURCES[key];var item=state.editing.item||{};return '<form class="form" data-form="'+key+'">'+r.fields.map(function(f){return fieldHtml(f,item[f[0]])}).join("")+'<div class="form-actions"><button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i>Save</button><button class="btn btn-light" type="button" data-cancel-editor>Cancel</button>'+(state.editing.mode==="edit"?'<button class="btn btn-danger" type="button" data-delete="'+key+'" data-id="'+esc(item.id)+'"><i class="fa-solid fa-trash"></i>Delete</button>':"")+'</div></form>'}
function fieldHtml(field,value){var name=field[0],label=field[1],type=field[2],placeholder=field[3]||"",options=field[4]||[];if(type==="textarea")return '<div class="field"><label>'+label+'</label><textarea data-field="'+name+'" placeholder="'+esc(placeholder)+'">'+esc(value||"")+'</textarea></div>';if(type==="select")return '<div class="field"><label>'+label+'</label><select data-field="'+name+'">'+options.map(function(opt){return '<option value="'+esc(opt)+'" '+(String(value||"")===String(opt)?"selected":"")+'>'+esc(labelStatus(opt))+'</option>'}).join("")+'</select></div>';return '<div class="field"><label>'+label+'</label><input data-field="'+name+'" type="'+type+'" placeholder="'+esc(placeholder)+'" value="'+esc(value||"")+'"></div>'}
function formPayload(form){var payload={};form.querySelectorAll("[data-field]").forEach(function(el){payload[el.dataset.field]=el.value});return payload}
async function saveResource(key,form){var r=RESOURCES[key];var payload=formPayload(form);var editing=state.editing;var path=editing.mode==="edit"?r.api+"/"+encodeURIComponent(editing.item.id):r.api;var method=editing.mode==="edit"?"PUT":"POST";await api(path,{method:method,body:JSON.stringify(payload)});toast(r.singular+" saved");state.editing=null;await load();state.view="resource";state.resource=key;renderNav();renderResource(key)}
async function deleteResource(key,id){var r=RESOURCES[key];if(!confirm("Delete this "+r.singular.toLowerCase()+"?"))return;await api(r.api+"/"+encodeURIComponent(id),{method:"DELETE"});toast(r.singular+" deleted");state.editing=null;await load();state.view="resource";state.resource=key;renderNav();renderResource(key)}
function startEdit(key,id){var row=list(RESOURCES[key].store).find(function(item){return item.id===id});state.editing={mode:"edit",item:Object.assign({},row)};state.view="resource";state.resource=key;renderNav();renderResource(key)}
function startNew(key){state.editing={mode:"new",item:{}};state.view="resource";state.resource=key;renderNav();renderResource(key)}
function renderRuns(){setTitle("Workflow Operations","Launch controlled workflows and review execution records.");var workflows=list("workflows");var runs=list("workflowRuns");els.content.innerHTML='<div class="split"><div class="panel"><div class="panel-head"><div><h3>Execution records</h3><p>Workflow runs persisted in the backend store.</p></div></div><div class="panel-body">'+runsTable(runs)+'</div></div><aside class="panel editor"><div class="panel-head"><div><h3>Start workflow</h3><p>Create a new auditable execution.</p></div></div><div class="panel-body"><form class="form" id="runForm"><div class="field"><label>Workflow</label><select data-run-field="workflow">'+workflows.map(function(w){return '<option>'+esc(w.name)+'</option>'}).join("")+'</select></div><div class="field"><label>Target</label><input data-run-field="target" placeholder="checkout-api"></div><div class="field"><label>Owner</label><input data-run-field="owner" placeholder="Platform"></div><div class="field"><label>Context</label><textarea data-run-field="context" placeholder="Business context"></textarea></div><div class="form-actions"><button class="btn btn-green" type="submit"><i class="fa-solid fa-play"></i>Start workflow</button></div></form></div></aside></div>'}
function runsTable(runs){if(!runs.length)return '<div class="empty"><i class="fa-solid fa-play"></i>No workflow runs yet.</div>';return '<div class="table-wrap"><table><thead><tr><th>Workflow</th><th>Target</th><th>Owner</th><th>Status</th><th>Created</th></tr></thead><tbody>'+runs.map(function(r){return '<tr><td><div class="entity"><strong>'+esc(r.workflow)+'</strong><small>'+esc(r.context||"")+'</small></div></td><td>'+esc(r.target)+'</td><td>'+esc(r.owner)+'</td><td>'+badge(r.status)+'</td><td>'+esc(r.createdAt?new Date(r.createdAt).toLocaleString():"")+'</td></tr>'}).join("")+'</tbody></table></div>'}
async function submitRun(form){var payload={};form.querySelectorAll("[data-run-field]").forEach(function(el){payload[el.dataset.runField]=el.value});payload.status="requested";await api("/api/idp/workflow-runs",{method:"POST",body:JSON.stringify(payload)});toast("Workflow started");await load();state.view="runs";renderNav();renderRuns()}
function renderAudit(){setTitle("Audit Log","Track backend changes and workflow activity.");var rows=list("auditLogs");els.content.innerHTML='<div class="hero"><div><h2>Audit trail</h2><p>Every admin write and workflow launch is recorded by the backend store.</p></div><div class="hero-meta"><span class="chip">'+rows.length+' events</span></div></div><div class="panel"><div class="panel-body"><div class="audit-log">'+(rows.length?rows.map(function(row){return '<div class="audit-item"><strong>'+esc(row.action)+' / '+esc(row.entity)+'</strong><p>'+esc(row.details||"")+'<br>'+esc(row.actor||"system")+' - '+esc(row.at?new Date(row.at).toLocaleString():"")+'</p></div>'}).join(""):'<div class="empty"><i class="fa-solid fa-clipboard-list"></i>No audit records yet.</div>')+'</div></div></div>'}
function renderModel(){setTitle("Store JSON","Inspect the complete backend store.");els.content.innerHTML='<div class="hero"><div><h2>Backend store</h2><p>Raw JSON view for debugging, handoff and future migration to Postgres or Supabase.</p></div><div class="hero-meta"><button class="btn btn-primary" id="exportStoreInline"><i class="fa-solid fa-download"></i>Export JSON</button></div></div><pre class="json-box">'+esc(JSON.stringify(state.store||{},null,2))+'</pre>'}
function renderOffline(){setTitle("Backend unavailable","Start the local server to control IDP data.");els.content.innerHTML='<div class="empty"><i class="fa-solid fa-plug-circle-xmark"></i>Backend unavailable. Run <strong>node server.js</strong> from the project root.</div>'}
function render(){state.query=state.query||"";if(state.view==="overview")renderOverview();else if(state.view==="runs")renderRuns();else if(state.view==="audit")renderAudit();else if(state.view==="model")renderModel();else renderResource(state.resource)}
function applyAdminHash(){var h=(location.hash||"").replace("#","");if(!h)return;if(["overview","runs","audit","model"].indexOf(h)>=0){state.view=h;}else if(RESOURCES[h]){state.view="resource";state.resource=h;}}
function exportStore(){var blob=new Blob([JSON.stringify(state.store||{},null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="idp-store-export.json";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
document.addEventListener("DOMContentLoaded",function(){["mainNav","content","globalSearch","secretInput","statusDot","statusText","viewTitle","viewSubtitle","toast","toastText"].forEach(function(id){els[id]=$(id)});els.secretInput.value=state.secret;els.secretInput.addEventListener("input",function(){state.secret=els.secretInput.value;localStorage.setItem("idpAdminSecret",state.secret)});$("refreshTop").addEventListener("click",load);$("refreshSide").addEventListener("click",load);$("exportStore").addEventListener("click",exportStore);els.globalSearch.addEventListener("input",function(e){state.query=e.target.value;render()});document.addEventListener("click",function(e){var view=e.target.closest("[data-view]");var res=e.target.closest("[data-resource]");var jump=e.target.closest("[data-view-jump]");var create=e.target.closest("[data-new]");var edit=e.target.closest("[data-edit]");var del=e.target.closest("[data-delete]");var cancel=e.target.closest("[data-cancel-editor]");if(view){state.view=view.dataset.view;state.query="";els.globalSearch.value="";state.editing=null;renderNav();render()}if(res){state.view="resource";state.resource=res.dataset.resource;state.query="";els.globalSearch.value="";state.editing=null;renderNav();renderResource(state.resource)}if(jump){state.view=jump.dataset.viewJump;renderNav();render()}if(create)startNew(create.dataset.new);if(edit)startEdit(edit.dataset.edit,edit.dataset.id);if(del)deleteResource(del.dataset.delete,del.dataset.id).catch(function(error){toast(error.message)});if(cancel){state.editing=null;renderResource(state.resource)}if(e.target.id==="exportStoreInline")exportStore()});document.addEventListener("submit",function(e){var form=e.target.closest("[data-form]");if(form){e.preventDefault();saveResource(form.dataset.form,form).catch(function(error){toast(error.message)})}if(e.target.id==="runForm"){e.preventDefault();submitRun(e.target).catch(function(error){toast(error.message)})}});applyAdminHash();renderNav();load();window.addEventListener("hashchange",function(){applyAdminHash();renderNav();if(state.store)render();})});
</script>
<script type="module" src="/assets/js/idp-store-sync.js"></script>
<script>
  /* Re-render the admin when the cloud store syncs in (Firestore -> local). */
  window.addEventListener("koffi-store-synced", function(){ try { if (typeof load === "function") load(); } catch (e) {} });
  window.addEventListener("koffi-store-status", function(e){
    var el = document.getElementById("statusText"); if (!el) return;
    var s = e.detail;
    if (s === "synced") el.textContent = "Cloud synced";
    else if (s === "connecting") el.textContent = "Connecting…";
    else if (s === "error") el.textContent = "Local store";
  });
</script>
