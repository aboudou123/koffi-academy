<script>
const LESSONS = [{"module": "Kursüberblick", "title": "Kursinhalte und Lernpfad", "content": "# Platform Engineering mit Crossplane\n\n**Data Engineering**  \n**Autor:** Koffitse Aboudou\n\n## Kursinhalte\nDieser Kurs wurde in eine logischere Chronologie gebracht. Die ursprünglichen Inhalte waren teilweise gemischt; hier folgt der Lernpfad vom grundlegenden Verständnis bis zum fortgeschrittenen Betrieb.\n\n1. **Kurseinführung und Lernziele** – Warum dieser Kurs existiert und was gebaut wird.\n2. **Platform-Engineering-Grundlagen** – Problem, Lösung und IDP-Prinzipien.\n3. **Was ist Crossplane?** – Kernfunktionen, Features, Vorteile und Grenzen.\n4. **Crossplane-Architektur** – Core, Provider, Managed Resources, Compositions, XRs und Claims.\n5. **Kubernetes für Crossplane konfigurieren** – Cluster, Installation, CLI und Debugging.\n6. **AWS-Provider und Managed Resources** – Provider installieren, Credentials einrichten, Cloud-Ressourcen verwalten.\n7. **Compositions und Plattformabstraktionen** – XRDs, Claims, Patch & Transform, Connection Details.\n8. **Paketierung und Bereitstellung** – Configuration Packages, OCI-Registries und Versionierung.\n9. **Erweiterte Funktionen** – Composition Functions und fortgeschrittene Muster.\n10. **GitOps-Betrieb** – Argo CD / Flux-Patterns für Crossplane-Plattformen.\n11. **Crossplane v2.0** – Evolution, Migration und neue Betriebsmodelle.\n\n## Lernziele\nNach Abschluss dieses Kurses können Sie:\n\n- die Crossplane-Architektur und zentrale Platform-Engineering-Konzepte erklären,\n- Kubernetes-Cluster für Crossplane-basierte Plattformen konfigurieren,\n- AWS-Provider installieren und konfigurieren,\n- AWS-Ressourcen mit Crossplane Managed Resources erstellen und verwalten,\n- wiederverwendbare Infrastructure Compositions entwerfen,\n- Composite Resource Definitions (XRDs) für Self-Service erstellen,\n- Multi-Tenancy mit Claims, Namespaces und RBAC implementieren,\n- Patch- und Transformationsmuster anwenden,\n- Plattformen mit Configuration Packages paketieren,\n- Pakete über OCI-Registries verteilen,\n- Versionen und Abhängigkeiten verwalten,\n- Composition Functions nutzen,\n- GitOps-fähige Plattformen aufbauen,\n- Sicherheits-Best-Practices anwenden,\n- zu Crossplane v2.0 migrieren,\n- operative Workflows implementieren.\n\n## Erworbene Fähigkeiten\n- Entwicklung von Internal Developer Platforms (IDP)\n- Platform Engineering mit Kubernetes\n- Cloud-native Infrastrukturautomatisierung\n- Self-Service-Infrastrukturmuster\n- Kubernetes-Operator- und Controller-Denken\n- Plattformabstraktionsdesign\n- GitOps-Methodik\n- Plattformmigration und -evolution\n- Workflow-Automatisierung\n- Erweiterte Multi-Tenancy-Konzepte\n\n## Voraussetzungen\n- Grundkenntnisse in Kubernetes: Pods, Deployments, Services\n- Verständnis von YAML und Kubernetes-Manifests\n- Vertrautheit mit AWS-Services und IAM\n- Grundlegende Kommandozeilenerfahrung\n- Verständnis von Infrastructure-as-Code- und Platform-Engineering-Konzepten", "diagram": "learningPath"}, {"module": "Kursüberblick", "title": "Kurseinführung zu Crossplane", "content": "# Kurseinführung zu Crossplane\n\n## Willkommensgruß: Crossplane\nHerzlich willkommen zu meinem Kurs **Crossplane: Platform Engineering mit cloud-nativer Infrastructure as Code**.\n\nEs freut mich riesig, dass ihr heute dabei seid. Gemeinsam werden wir entdecken, wie wir mit Crossplane leistungsstarke interne Entwicklerplattformen (IDPs) aufbauen können. Dieser Kurs bleibt nicht nur theoretisch, sondern führt tief in die Welt der cloud-nativen Infrastruktur ein – inklusive praxisnaher Labs.\n\nIn den kommenden Stunden lernen Sie alles, was Sie benötigen, um Crossplane souverän zu beherrschen und robuste sowie skalierbare Platform-Engineering-Lösungen zu entwickeln.\n\nIch bin euer Dozent, **Koffitse Aboudou**. Lassen Sie uns direkt loslegen.\n\n## Was wir heute erreichen wollen\n- **Verständnis:** Die Architektur hinter Crossplane verstehen.\n- **Praxis:** Echte Cloud-Ressourcen über Kubernetes-APIs verwalten.\n- **Engineering:** Eigene Abstraktionen und Compositions erstellen.\n\n## Kursübersicht\n### Bau von produktionsbereiten internen Entwicklerplattformen\nErstellen Sie selbstbedienbare Infrastruktur mit dem Kubernetes-nativen Ansatz von Crossplane.\n\n### Technologie-Stack\nDer Kurs kombiniert **Crossplane**, **Kubernetes**, **AWS** und später **Argo CD** für GitOps.\n\n### Praktisches Lernen\nDer Kurs richtet sich an Lernende mit bestehendem Kubernetes-Wissen, die bereit sind, zum Platform Engineering aufzusteigen.\n\n## Lernziele\n### Platform Engineering\nVerstehen Sie Kernkonzepte und Vorteile für moderne Infrastrukturbereitstellung.\n\n### Crossplane-Architektur\nBeherrschen Sie die Komponenten und Workflows, die eine universelle Control Plane ermöglichen.\n\n### AWS-Integration\nKonfigurieren Sie Provider und verwalten Sie Cloud-Ressourcen über Kubernetes.\n\n### Composition-Muster\nErstellen Sie wiederverwendbare Infrastrukturvorlagen für Entwickler-Self-Service.\n\n### Betriebsbereitstellung\nImplementieren Sie GitOps-Workflows und betriebliche Best Practices.\n\n## Voraussetzungen und Anforderungen\n### Kubernetes-Wissen\nVertrautheit mit Pods, Deployments, Services und YAML-Konfiguration.\n\n### AWS-Vertrautheit\nGrundlegendes Verständnis von AWS-Diensten wie VPC, EC2 und RDS.\n\n### Befehlszeile\nSichere Handhabung von `kubectl` und grundlegenden Linux-Befehlen.\n\n### Plattformkonzepte\nVerständnis der Prinzipien und Praktiken von Infrastructure as Code.\n\n### Laborumgebung\nZugang zu Minikube, Kind oder einem Kubernetes-Cluster für praktische Übungen.\n\n## Die Herausforderung des Platform Engineering\n### Traditionelle Probleme\n- **Langsame Bereitstellung:** Manuelle Infrastruktur dauert Wochen und blockiert Entwicklungsteams.\n- **Engpässe:** Plattform-Teams werden mit Routineanfragen überwältigt.\n- **Inkonsistenz:** Jede Bereitstellung wird zum einzigartigen Schneekristall und erschwert Wartung.\n\n### Die Lösung\nSelf-Service-Infrastruktur durch Plattformabstraktionen, die Entwickler ermächtigen und gleichzeitig Konsistenz, Sicherheit und Kontrolle bewahren.\n\n## Wichtige Punkte\n- Kursfokus auf produktionsbereite Internal Developer Platforms mit Crossplane.\n- Technologie-Stack umfasst Crossplane, Kubernetes, AWS und Argo CD für GitOps.\n- Entwickelt für Anwender mit bestehendem Kubernetes-Wissen.\n- Voraussetzungen umfassen Kubernetes, AWS, CLI und IaC-Konzepte.\n- Der Kurs adressiert langsame Bereitstellung, Engpässe und Inkonsistenz.\n\n## Zusätzliche Ressourcen\n- Crossplane Offizielle Dokumentation\n- Platform Engineering Leitfaden\n- Kubernetes Dokumentation", "diagram": "platformChallenge"}, {"module": "Grundlagen", "title": "Platform-Engineering-Grundlagen", "content": "# Platform-Engineering-Grundlagen\n\n## Einführung\nErfahren Sie, wie Platform Engineering traditionelle DevOps-Praktiken transformiert und wie Crossplane Teams dabei unterstützt, leistungsfähige Internal Developer Platforms (IDPs) bereitzustellen.\n\nWillkommen in der Welt des Platform Engineering – der Weiterentwicklung von DevOps, die grundlegend verändert, wie Organisationen Infrastruktur verwalten und die Produktivität von Entwicklern steigern.\n\n## Die Herausforderung: Traditionelles Infrastrukturmanagement\nViele DevOps-Engineers kämpfen mit Multi-Cloud-Management. Traditionelle Infrastrukturverwaltung steht vor mehreren kritischen Problemen:\n\n- Komplexe Tool-Vielfalt durch unterschiedliche Cloud-Anbieter\n- Häufiger Kontextwechsel zwischen verschiedenen Interfaces\n- Inkonsistente Workflows je nach Umgebung\n- Betriebsteams werden zum Engpass für Entwickler\n- Wissenssilos durch spezialisiertes Cloud-Fachwissen\n\n## Platform Engineering: Die Lösung\nPlatform Engineering konzentriert sich auf den Aufbau von **Internal Developer Platforms**. Diese ermöglichen Teams Self-Service-Zugriff auf Infrastruktur und Tools, während Governance, Sicherheit und Best Practices gewährleistet bleiben.\n\n## Zentrale Prinzipien des Platform Engineering\n- Self-Service-Infrastruktur\n- Golden Paths: standardisierte, sichere Vorgehensweisen\n- Abstraktion von Komplexität\n- Fokus auf Developer Experience\n- Plattform als Produkt mit klaren Nutzern: Entwicklerinnen und Entwickler\n\n## Einführung in Crossplane: Kubernetes-natives Platform Engineering\nCrossplane verwandelt Kubernetes in eine universelle Control Plane für Infrastruktur. Anstatt mehrere Cloud-spezifische Tools zu verwenden, erfolgt die Verwaltung über Kubernetes-APIs.\n\n## Warum Crossplane für Platform Engineering?\n### 1. Universelle Control Plane\n- Eine API für alle Cloud-Anbieter\n- Kubernetes-native Arbeitsweise\n- Deklaratives Infrastrukturmanagement\n\n### 2. Plattformabstraktionen\n- Entwicklerfreundliche High-Level-APIs\n- Verbergen komplexer Cloud-Details\n- Bündelung mehrerer Ressourcen zu Services\n\n### 3. Self-Service-Aktivierung\n- Infrastruktur über einfache Claims anfordern\n- Automatische Bereitstellung\n- Keine manuellen Prozesse\n\n### 4. Integrierte Governance\n- Richtlinienkontrolle über RBAC\n- Quoten und Limits\n- Auditierbarkeit und Compliance\n\n## Crossplane vs. traditionelle Infrastructure as Code\n| Traditionelles IaC | Crossplane Platform Engineering |\n|---|---|\n| Tool-spezifische Workflows | Kubernetes-native Workflows |\n| Manuelles State-Management | etcd-basiertes State-Management |\n| Begrenzte Drift-Erkennung | Automatische Reconciliation |\n| Separate CI/CD-Pipelines | Native Kubernetes-Deployments |\n| Abhängigkeit vom Ops-Team | Entwickler-Self-Service |\n| Cloud-spezifisches Wissen | Abstrahierte APIs |\n\n## Echtzeit-Infrastrukturmanagement\nCrossplane bietet:\n\n- Live-Statusüberwachung\n- Automatische Drift-Erkennung\n- Selbstheilende Ressourcen\n- Ereignisgesteuerte Reaktionen\n\n## Vorteile des Platform Engineering\n### Für Plattformteams\n- Weniger manueller Aufwand\n- Standardisierung\n- Sicherheit standardmäßig integriert\n- Skalierbarkeit\n\n### Für Entwicklungsteams\n- Schnellere Bereitstellung\n- Geringere Komplexität\n- Konsistente Umgebungen\n- Kein Kontextwechsel\n\n### Für Organisationen\n- Kostenoptimierung\n- Risikoreduktion\n- Schnellere Innovation\n- Nutzung bestehender Kubernetes-Kenntnisse\n\n## Komponenten einer Internal Developer Platform\nTypische Bestandteile:\n\n- Compute-Plattformen: Kubernetes, Serverless\n- Datendienste: Datenbanken, Caches, Queues\n- Sicherheitsdienste: Identitäten, Secrets, Zertifikate\n- Netzwerkdienste: Load Balancer, DNS, CDN\n- Observability: Monitoring, Logging, Tracing\n- Entwicklungstools: CI/CD, Artefakt-Registries\n\n## Der weitere Weg\nIn diesem Kurs lernen Sie:\n\n- Crossplane-Architektur verstehen\n- AWS-Provider integrieren\n- Plattformabstraktionen erstellen\n- Wiederverwendbare Compositions entwickeln\n- Claims-basierte Workflows implementieren\n- GitOps-Integration umsetzen\n\n## Praxisbeispiel\nEin Entwickler erstellt lediglich:\n\n```yaml\napiVersion: platform.company.com/v1alpha1\nkind: WebApp\nmetadata:\n  name: my-awesome-app\nspec:\n  environment: production\n  size: medium\n  database: postgresql\n```\n\nAutomatisch werden bereitgestellt:\n\n- VPC mit korrektem Netzwerk\n- PostgreSQL-Datenbank\n- Sicherheitsrichtlinien\n\nKein Cloud-Fachwissen. Kein Warten. Nur deklarative Anforderungen.\n\n## Wichtige Punkte\n- Platform Engineering ermöglicht Self-Service-Infrastruktur.\n- Crossplane macht Kubernetes zur universellen Control Plane.\n- Automatische Drift-Erkennung und Selbstheilung erhöhen Stabilität.\n- Abstraktionen reduzieren Komplexität.\n- Kubernetes-native Prozesse vermeiden Kontextwechsel.\n\n## Zusätzliche Ressourcen\n- Offizielle Crossplane-Dokumentation\n- CNCF Platform Engineering Landscape\n- Leitfäden zum Aufbau interner Entwicklerplattformen", "diagram": "idpComponents"}, {"module": "Grundlagen", "title": "Was ist Crossplane?", "content": "# Was ist Crossplane?\n\nWillkommen zu dieser umfassenden Einführung in **Crossplane**. In dieser Lektion untersuchen wir, was Crossplane ist, welche Kernfunktionen es bietet, welche Hauptmerkmale es auszeichnen und wie es im Vergleich zu anderen Infrastrukturverwaltungstools wie Terraform abschneidet.\n\n## Einleitung\nDie Verwaltung von Infrastruktur ist zunehmend komplexer geworden. Unternehmen arbeiten mit mehreren Cloud-Anbietern, unterschiedlichen Diensten und der ständigen Herausforderung, Konsistenz über verschiedene Umgebungen hinweg zu wahren. Hier kommt Crossplane ins Spiel.\n\n**Crossplane** ist ein Kubernetes-natives Tool zur Infrastrukturverwaltung. Es ist ein Open-Source-Projekt, das Ihren Kubernetes-Cluster in eine leistungsstarke Control Plane für Infrastruktur verwandelt.\n\n## Was ist Crossplane im Detail?\nIm Kern ist Crossplane ein Kubernetes-Add-on, das die Kubernetes-API erweitert, um Cloud-Infrastrukturdienste zu verwalten und bereitzustellen. Es folgt einem deklarativen, API-gesteuerten Ansatz: Sie beschreiben, welche Infrastruktur Sie wünschen, und Crossplane kümmert sich um den Rest.\n\nDie zentrale Idee ist, Kubernetes in eine universelle Control Plane zu verwandeln. Anstatt separate Tools für Anwendungsbereitstellung und Infrastrukturverwaltung zu verwenden, vereint Crossplane beides unter dem vertrauten Kubernetes-API-Modell.\n\nSo wie Kubernetes die Art und Weise verändert hat, wie wir Anwendungen bereitstellen und verwalten, verändert Crossplane die Art und Weise, wie wir Infrastruktur bereitstellen und verwalten – mit denselben Kubernetes-Mustern und Werkzeugen.\n\n## Kernfunktionen\n### 1. Deklarative Konfiguration\nMit Crossplane deklarieren Sie den gewünschten Infrastrukturzustand über YAML-Manifeste, genau wie bei Kubernetes-Deployments. Sie schreiben keine imperativen Skripte und müssen die Reihenfolge der Vorgänge nicht selbst orchestrieren.\n\nStatt eine Reihe von AWS-CLI-Befehlen auszuführen, erstellen Sie ein YAML-Manifest, das Ihr Netzwerk-Setup beschreibt. Crossplane kümmert sich um Abhängigkeiten und Orchestrierung.\n\n### 2. Multi-Cloud-Bereitstellungen\nCrossplane bietet eine einheitliche API für Ressourcen über mehrere Cloud-Anbieter hinweg. Ob AWS, Azure, Google Cloud oder On-Premises: Sie verwenden denselben Kubernetes-ähnlichen Ansatz.\n\nTeams können sich auf Geschäftslogik konzentrieren, statt auf Cloud-spezifische Implementierungsdetails.\n\n### 3. Infrastructure as Code\nAlles in Crossplane ist versionierbar, teilbar und wiederverwendbar. Infrastrukturdefinitionen leben neben Anwendungscode in Git-Repositories. Sie können GitOps, Code Review und Automatisierung für Infrastruktur nutzen.\n\n## Kernmerkmale\n### Provider Packages\nProvider Packages erweitern die Kubernetes-API, um Cloud-Dienste zu unterstützen. Jedes Provider Package enthält Custom Resource Definitions (CRDs), die Cloud-Ressourcen als Kubernetes-Objekte repräsentieren.\n\nDer AWS Provider fügt beispielsweise CRDs für EC2, S3, RDS und viele weitere AWS-Dienste hinzu. Danach können Sie diese Ressourcen mit `kubectl` erstellen und verwalten.\n\nCloud-Ressourcen werden dadurch zu Kubernetes-Bürgern erster Klasse: Sie können S3-Buckets mit `kubectl` auflisten, RBAC anwenden und Controller-basierte Automatisierung nutzen.\n\n### Composition\nComposition ist der Abstraktionsmechanismus von Crossplane. Plattformteams definieren High-Level-Ressourcen über Composite Resource Definitions (XRDs), die auf konkrete Cloud-Ressourcen abbilden.\n\nStatt Entwicklern die Erstellung von VPC, Subnetzen, Sicherheitsgruppen, Load Balancern und Datenbanken zuzumuten, erstellt das Plattformteam beispielsweise eine **WebApp**-API. Wenn Entwickler eine WebApp-Ressource erstellen, stellt Crossplane automatisch die zugrunde liegende AWS-Infrastruktur bereit.\n\nDiese Abstraktion vereinfacht die Developer Experience und integriert Best Practices direkt in die Plattform.\n\n### Resource Claims\nResource Claims bieten eine anbieterunabhängige Möglichkeit, Infrastruktur anzufordern. Entwickler fragen nicht nach einer spezifischen AWS-RDS-Instanz, sondern nach einer SQL-Datenbank. Die Plattform entscheidet, welcher Anbieter und welche Konfiguration verwendet werden.\n\n### Policy-Driven Resource Allocation\nCrossplane unterstützt Richtlinien, um Sicherheitsanforderungen, Kostenkontrollen, Compliance-Standards und operative Best Practices durchzusetzen.\n\nBeispiel: Alle Produktionsdatenbanken müssen verschlüsselt, täglich gesichert und über mehrere Availability Zones bereitgestellt werden. Entwickler müssen diese Regeln nicht kennen – die Plattform setzt sie durch.\n\n## Erste Schritte\nEine einfache Installation kann so aussehen:\n\n```bash\nkubectl create namespace crossplane-system\nkubectl apply -f https://raw.githubusercontent.com/crossplane/crossplane/release-1.14/install.yaml\n```\n\nDanach können Provider Packages installiert und Cloud-Ressourcen über Kubernetes verwaltet werden.\n\n## Crossplane vs. Terraform\nBeide Werkzeuge sind stark, haben aber unterschiedliche Schwerpunkte. Terraform ist weit verbreitet und besitzt ein sehr reifes Provider-Ökosystem. Crossplane ist Kubernetes-nativ und eignet sich besonders für Platform Engineering, Self-Service und kontinuierliche Reconciliation.\n\n## 9 Vorteile von Crossplane\n1. **Kubernetes-native Integration:** Eine API für Anwendungen und Infrastruktur.\n2. **Echtzeit-Ressourcenstatus:** Kontinuierliche Überwachung über Control Loops.\n3. **Dynamische Bereitstellung:** Ressourcen können über Claims bedarfsgerecht entstehen.\n4. **Multi-Cloud-Bereitstellungen:** Einheitlicher API-zentrierter Ansatz.\n5. **Richtliniengesteuerte Governance:** Regeln werden in Echtzeit durchgesetzt.\n6. **CI/CD-Integration:** Passt zu Argo CD, Flux und Tekton.\n7. **Teamzusammenarbeit:** Feingranulare Zugriffskontrolle mit Kubernetes RBAC.\n8. **Keine Zustandsdateien verwalten:** Zustand liegt in Kubernetes etcd.\n9. **Erweiterbarkeit:** Provider, Controller, Functions und Operator-Muster.\n\n## 3 Nachteile von Crossplane\n1. **Reifegrad und Ökosystem:** Terraform hat ein älteres und breiteres Ökosystem.\n2. **Lernkurve:** Effektive Nutzung erfordert solide Kubernetes-Kenntnisse.\n3. **Zusätzliche Komplexität:** Kubernetes selbst muss zuverlässig betrieben werden.\n\n## Fazit\nWählen Sie Crossplane, wenn Sie Kubernetes-zentriert arbeiten, Platform Engineering betreiben, Self-Service-Infrastruktur anbieten möchten und kontinuierliche Reconciliation benötigen.\n\nWählen Sie Terraform, wenn Sie das breiteste Provider-Ökosystem benötigen, Ihr Team wenig Kubernetes-Erfahrung hat oder Sie Infrastruktur über viele Systeme hinweg mit explizitem Workflow verwalten möchten.\n\n## Wichtige Punkte\n- Crossplane ist ein Kubernetes-natives Tool zur Infrastrukturverwaltung.\n- Drei Kernfunktionen: deklarative Konfiguration, Multi-Cloud und Infrastructure as Code.\n- Provider Packages erweitern die Kubernetes-API.\n- Composition erzeugt Plattformabstraktionen.\n- Claims ermöglichen anbieterunabhängige Infrastruktur-Anfragen.\n- Stärken gegenüber Terraform: Kubernetes-native Integration, Echtzeitstatus, dynamische Bereitstellung und kein separates State-Management.", "diagram": "crossplaneVsTerraform"}, {"module": "Architektur", "title": "Crossplane Architektur Überblick", "content": "# Crossplane Architecture Overview\n\nEine Einführung auf hoher Ebene in die Schlüsselkomponenten von **Crossplane** und wie sie zusammenwirken, um **Platform Engineering** zu ermöglichen.\n\n## Crossplane Architektur Überblick\nNachdem wir nun die Prinzipien des Platform Engineerings verstanden haben, wollen wir untersuchen, wie Crossplane dies möglich macht. Wir bleiben auf hoher Ebene und konzentrieren uns auf das Gesamtbild.\n\n## Das Gesamtbild: Universelle Control Plane\nCrossplane fungiert als Übersetzer zwischen Kubernetes und Ihren Cloud-Anbietern. Anstatt verschiedene Tools für AWS, Azure und GCP lernen zu müssen, verwenden Sie eine vertraute Schnittstelle: Kubernetes.\n\n## Kernkomponenten\n### 1. Crossplane Core\n- **Was es tut:** Verwaltet das gesamte System.\n- **Hauptaufgabe:** Stellt sicher, dass alles reibungslos zusammenarbeitet.\n- **Läuft auf:** Ihrem Kubernetes-Cluster.\n\n### 2. Provider\n- **Was sie tun:** Kommunizieren mit bestimmten Cloud-Anbietern.\n- **Beispiele:** AWS Provider, Azure Provider, GCP Provider.\n- **Hauptaufgabe:** Nehmen Anfragen entgegen und erstellen reale Cloud-Ressourcen.\n\n### 3. Managed Resources\n- **Was sie sind:** Spezifische Cloud-Ressourcen wie Datenbanken, Speicher und Netzwerke.\n- **Beispiele:** S3-Bucket, RDS-Datenbank, VPC.\n- **Hauptmerkmal:** Jede Managed Resource bildet direkt eine reale Cloud-Ressource ab.\n\n### 4. Compositions\n- **Was sie tun:** Definieren, wie mehrere Cloud-Ressourcen kombiniert werden.\n- **Zweck:** Vorlagen für typische Plattform-Services.\n- **Nutzen:** Wiederverwendbare Templates für häufige Szenarien.\n\n### 5. Composite Resources\n- **Was sie sind:** Laufende Infrastrukturinstanzen, die aus Compositions erstellt wurden.\n- **Beispiel:** Die gesamte Infrastruktur einer Webanwendung.\n- **Enthält:** Alle einzelnen Cloud-Ressourcen, die zusammenarbeiten.\n\n### 6. Claims\n- **Was sie sind:** Einfache Anfragen, die Entwickler stellen.\n- **Beispiel:** „Ich benötige eine mittelgroße Web-App mit PostgreSQL-Datenbank.“\n- **Hauptvorteil:** Entwickler müssen keine Cloud-Details kennen.\n\n## Wie alles zusammenarbeitet\n### Schritt 1: Ein Entwickler stellt eine Anfrage\nEin Entwickler erstellt einen einfachen Claim: „Ich benötige eine Webanwendung.“\n\n### Schritt 2: Crossplane arbeitet\n- Crossplane Core empfängt die Anfrage.\n- Findet die passende Composition.\n- Erstellt eine Composite Resource.\n\n### Schritt 3: Ressourcen werden erstellt\n- Die Composition weist Provider an, was zu erstellen ist.\n- Provider erstellen Cloud-Ressourcen wie S3, RDS und VPC.\n- Alles wird ordnungsgemäß verbunden.\n\n### Schritt 4: Entwickler erhält die Infrastruktur\n- Entwickler erhalten Verbindungsdetails.\n- Anwendungen können bereitgestellt werden.\n- Keine Cloud-Expertise erforderlich.\n\n## Hauptvorteile dieser Architektur\n### Für Plattformteams\n- Ein System zur Verwaltung: Kubernetes.\n- Wiederverwendbare Vorlagen.\n- Integrierte Sicherheit über RBAC.\n- Multi-Cloud-fähige Muster.\n\n### Für Entwickler\n- Einfache Schnittstelle.\n- Kein Cloud-Lernen nötig.\n- Schnelle Bereitstellung.\n- Konsistente Erfahrung.\n\n### Für Organisationen\n- Kostenkontrolle.\n- Sicherheit standardmäßig.\n- Schnellere Innovation.\n- Multi-Cloud-Flexibilität.\n\n## Beispiel aus der Praxis\n### Traditioneller Ansatz\nEin Entwickler benötigt eine Web-App mit Datenbank:\n\n- AWS-Konsole und CLI lernen.\n- VPC, Subnetze und Sicherheitsgruppen erstellen.\n- RDS-Datenbank konfigurieren.\n- Load Balancer und DNS konfigurieren.\n- Monitoring und Backups einrichten.\n- **Benötigte Zeit:** mehrere Tage bis Wochen.\n\n### Crossplane-Ansatz\nEin Entwickler benötigt eine Web-App mit Datenbank:\n\n- Eine einfache Datei mit Anforderungen erstellen.\n- Sie an Kubernetes übermitteln.\n- Verbindungsdetails erhalten.\n- **Benötigte Zeit:** Minuten.\n\n## Die Macht der Abstraktion\nDie Architektur schafft Abstraktionsebenen:\n\n- **Unterste Ebene:** rohe Cloud-APIs, komplex und anbieterspezifisch.\n- **Mittlere Ebene:** Managed Resources, standardisiert aber detailliert.\n- **Oberste Ebene:** Plattform-APIs, einfach und entwicklerfreundlich.\n\nPlattformteams kümmern sich um Komplexität, Entwickler profitieren von Einfachheit.\n\n## Was kommt als Nächstes?\nIn den kommenden Lektionen und Labs werden wir:\n\n- einen Kubernetes-Cluster mit Crossplane einrichten,\n- AWS-Provider installieren,\n- erste Managed Resources erstellen,\n- Plattformabstraktionen mit Compositions bauen,\n- Entwickler-Self-Service ermöglichen.\n\n## Wichtigste Erkenntnis\nCrossplane ist um ein Kernprinzip herum entworfen: **Komplexität verbergen, Einfachheit ermöglichen.**\n\n## Wichtige Punkte\n- Crossplane fungiert als universeller Übersetzer zwischen Kubernetes und Cloud-Anbietern.\n- Core verwaltet, Provider verbinden, Compositions dienen als Vorlagen.\n- Claims bieten eine einfache Schnittstelle.\n- Managed Resources handhaben Cloud-Komplexität.\n- Die Architektur schafft Abstraktionsebenen von komplexen APIs bis zu einfachen Entwicklerschnittstellen.", "diagram": "crossplaneArchitecture"}, {"module": "Architektur", "title": "Crossplane Architektur Whiteboard", "content": "# Crossplane Architecture Whiteboard\n\nEin visueller Rundgang durch die Architektur von Crossplane anhand von Whiteboard-Diagrammen, um Komponentenbeziehungen und Datenfluss zu veranschaulichen.\n\n## Architektur-Übersichtsdiagramm\nDie Schönheit von Crossplane liegt in seiner geschichteten Architektur.\n\n### Das Drei-Schichten-Modell\n#### Schicht 1: Cloud-Anbieter-Schicht\n- Rohe Cloud-APIs wie AWS, Azure und GCP.\n- Komplexe, anbieterspezifische Schnittstellen.\n- Hier wird die eigentliche Infrastruktur erstellt.\n\n#### Schicht 2: Crossplane-Ressourcen-Schicht\n- Managed Resources als standardisierte Darstellungen von Cloud-Ressourcen.\n- Provider übersetzen zwischen Kubernetes und Cloud-APIs.\n- Compositions kombinieren mehrere Ressourcen zu Vorlagen.\n\n#### Schicht 3: Plattform-API-Schicht\n- Claims als einfache Entwickleranfragen.\n- Composite Resources als laufende Infrastrukturinstanzen.\n- Benutzerdefinierte APIs, definiert von Plattformteams.\n\n## Beziehungen der Kernkomponenten\n### Crossplane Core\n- Zentraler Orchestrator.\n- Überwacht Änderungen an Kubernetes-Ressourcen.\n- Koordiniert Provider.\n- Setzt Composition-Logik und Ressourcenlebenszyklus durch.\n\n### Provider-Architektur\n- Jeder Provider läuft als Kubernetes-Controller.\n- Provider bilden Kubernetes-Ressourcen auf Cloud-API-Aufrufe ab.\n- Provider gleichen kontinuierlich gewünschten und tatsächlichen Zustand ab.\n- Mehrere Provider können gleichzeitig laufen.\n\n### Composition-Engine-Fluss\n- Compositions definieren Ressourcen-Blaupausen.\n- XRDs definieren das API-Schema.\n- Composite Resources erstellen bei Bedarf Managed Resources.\n- Crossplane kümmert sich um Reihenfolge und Abhängigkeiten.\n\n## Visualisierung des Datenflusses\n### Schritt 1: Entwickleranfrage\nEntwickler → Claim → Kubernetes API Server.  \nEine einfache YAML-Datei enthält Anforderungen auf hoher Ebene.\n\n### Schritt 2: Crossplane-Verarbeitung\nKubernetes API → Crossplane Core → Composition-Auswahl.  \nDer Core-Controller erkennt einen neuen Claim und ordnet ihn einer Composition zu.\n\n### Schritt 3: Ressourcenerstellung\nComposition → Composite Resource → Managed Resources.  \nDie Vorlage wird instanziiert und generiert mehrere Managed Resources.\n\n### Schritt 4: Provider-Ausführung\nManaged Resources → Provider → Cloud-APIs.  \nProvider übersetzen in Cloud-spezifische API-Aufrufe.\n\n### Schritt 5: Statusweitergabe\nCloud-Ressourcen → Provider → Managed Resources → Composite Resource → Claim.  \nStatus und Verbindungsdetails werden nach oben weitergegeben.\n\n## Interaktionsmuster der Komponenten\n### Controller-Muster\n- **Watch:** Controller beobachten Ressourcenänderungen.\n- **Reconcile:** Vergleich von gewünschtem und tatsächlichem Zustand.\n- **Act:** Maßnahmen ausführen, um den Zustand anzupassen.\n- **Repeat:** Kontinuierlicher Reconciliation-Zyklus.\n\n### Ressourcen-Hierarchie\n- Claim: Was der Entwickler möchte.\n- Composite Resource: Laufende Instanz.\n- Managed Resources: Einzelne Cloud-Ressourcen.\n- Cloud-Ressourcen: Tatsächliche Infrastruktur.\n\n## Übergreifende Aspekte\n- Sicherheit: RBAC-Kontrollen auf jeder Ebene.\n- Beobachtbarkeit: Status und Events werden weitergegeben.\n- Lebenszyklus: Erstellung, Aktualisierung und Löschung werden koordiniert.\n- Fehlerbehandlung: Fehler werden mit Kontext nach oben gereicht.\n\n## Fortgeschrittene Architekturkonzepte\n### Multi-Tenancy\n- Namespace-Isolation.\n- Geteilte oder private Compositions.\n- Feingranulare Berechtigungen pro Tenant.\n\n### Multi-Cloud-Orchestrierung\n- Provider-Unabhängigkeit.\n- Ressourcenverteilung über mehrere Clouds.\n- Einheitliche Verwaltung über eine Schnittstelle.\n\n### Erweiterbarkeit\n- Benutzerdefinierte Provider.\n- Composition Functions.\n- Integration mit Secret-Management-Systemen.\n\n## Überlegungen zu Leistung und Skalierung\n### Controller-Effizienz\n- Ereignisgesteuert statt Polling.\n- Parallele Verarbeitung.\n- Caching reduziert API-Aufrufe.\n\n### Ressourcenmanagement\n- Lazy Loading.\n- Automatisierte Bereinigung.\n- Zustandsabgleich bei Drift.\n\n## Fehlersuche durch die Architektur\n### Häufige Problemmuster\n- Claim bleibt hängen: Composition-Auswahl und XRD-Zuordnung prüfen.\n- Ressourcenerstellung schlägt fehl: Managed Resource Status und Events prüfen.\n- Provider-Probleme: Provider-Logs und Cloud-API-Antworten prüfen.\n- Berechtigungsprobleme: RBAC entlang der Hierarchie verfolgen.\n\n### Diagnoseablauf\n- Auf Claim-Ebene beginnen und nach unten arbeiten.\n- Status und Events jeder Schicht prüfen.\n- `kubectl` für Ressourcenbeziehungen verwenden.\n- Provider-Logs enthalten Cloud-spezifische Fehlerdetails.\n\n## Wichtigste architektonische Vorteile\n### Trennung der Belange\n- Plattformteams bauen zuverlässige Vorlagen.\n- Anwendungsteams konzentrieren sich auf Geschäftsanforderungen.\n- Betriebsteams optimieren Infrastruktur.\n\n### Skalierbarkeit\n- Horizontale Erweiterung durch Provider und Compositions.\n- Ressourcenwiederverwendung reduziert Redundanz.\n- Reconciliation ermöglicht automatisierten Betrieb.\n\n### Evolution\n- Versionierte APIs.\n- Schrittweise Migration.\n- Sichere Testisolierung.\n\n## Wichtigste Erkenntnis\nCrossplane basiert auf bewährten Kubernetes-Mustern, erweitert diese aber zur Verwaltung externer Ressourcen. Der Fluss von einfachen Claims zu komplexer Cloud-Infrastruktur zeigt die Macht moderner Plattformabstraktionen.\n\n## Wichtige Punkte\n- Drei Schichten trennen Cloud-APIs, Crossplane-Ressourcen und Plattform-APIs.\n- Controller-Muster ermöglichen ereignisgesteuerte Reconciliation.\n- Daten fließen bidirektional durch Composition-Engine und Provider-Schichten.\n- Visuelles Verständnis hilft beim Debugging und Design effektiver Plattformarchitekturen.", "diagram": "whiteboardLayers"}, {"module": "Grundlagen", "title": "Quiz zu den Grundlagen des Platform Engineering", "content": "# Quiz zu den Grundlagen des Platform Engineering\n\nPrüfen Sie Ihr Verständnis, bevor Sie mit der Installation beginnen.\n\n## Frage 1\nWas ist das Hauptziel einer Internal Developer Platform?\n\n<details>\n<summary>Lösung anzeigen</summary>\nEine IDP bietet Entwicklern Self-Service-Zugriff auf Infrastruktur, Tools und standardisierte Golden Paths, während Plattformteams Governance, Sicherheit und Best Practices kontrollieren.\n</details>\n\n## Frage 2\nWarum passt Crossplane besonders gut zu Kubernetes-zentrierten Organisationen?\n\n<details>\n<summary>Lösung anzeigen</summary>\nCrossplane erweitert die Kubernetes-API und nutzt Kubernetes-Konzepte wie CRDs, Controller, RBAC, Namespaces, Events und GitOps-Workflows.\n</details>\n\n## Frage 3\nWas ist der Unterschied zwischen Managed Resource und Claim?\n\n<details>\n<summary>Lösung anzeigen</summary>\nEine Managed Resource bildet meist direkt eine konkrete Cloud-Ressource ab. Ein Claim ist eine einfache, entwicklerfreundliche Anfrage nach einer abstrahierten Plattformressource.\n</details>\n\n## Frage 4\nWelche Rolle spielt Reconciliation?\n\n<details>\n<summary>Lösung anzeigen</summary>\nReconciliation sorgt dafür, dass der tatsächliche Zustand kontinuierlich an den gewünschten Zustand angepasst wird.\n</details>", "diagram": null}, {"module": "Kubernetes für Crossplane konfigurieren", "title": "Kubernetes-Setup für Crossplane", "content": "# Kubernetes-Setup für Crossplane\n\n## Ziel\nBevor Crossplane installiert wird, benötigen wir einen Kubernetes-Cluster, der stabil läuft und über `kubectl` erreichbar ist.\n\n## Empfohlene Optionen\n| Option | Einsatzgebiet | Vorteil |\n|---|---|---|\n| Minikube | Lokales Lernen | Schnell, einfach, ideal für Labs |\n| Kind | Lokales CI/Lab | Sehr leichtgewichtig und scriptbar |\n| EKS / AKS / GKE | Produktionsnahe Umgebung | Realistische Cloud-Integration |\n\n## Lokaler Start mit Minikube\n```bash\nminikube start --cpus=4 --memory=8192 --kubernetes-version=stable\nkubectl cluster-info\nkubectl get nodes\n```\n\n## Lokaler Start mit Kind\n```bash\nkind create cluster --name crossplane-lab\nkubectl cluster-info --context kind-crossplane-lab\nkubectl get nodes\n```\n\n## Namespace vorbereiten\n```bash\nkubectl create namespace crossplane-system\nkubectl get ns crossplane-system\n```\n\n## Warum Kubernetes wichtig ist\nCrossplane nutzt Kubernetes nicht nur als Laufzeitumgebung, sondern als API-Schicht. CRDs, Controller, RBAC und Events sind zentrale Bausteine.\n\n## Checkliste\n- `kubectl` funktioniert.\n- Ein Cluster ist erreichbar.\n- Nodes sind `Ready`.\n- Namespace `crossplane-system` existiert.\n- Sie verstehen, dass Crossplane als Controller im Cluster läuft.", "diagram": "kubernetesSetup"}, {"module": "Kubernetes für Crossplane konfigurieren", "title": "Crossplane installieren", "content": "# Crossplane installieren\n\n## Ziel\nInstallieren Sie Crossplane in Ihrem Kubernetes-Cluster und prüfen Sie, ob die Pods korrekt laufen.\n\n## Installation mit Helm\n```bash\nhelm repo add crossplane-stable https://charts.crossplane.io/stable\nhelm repo update\nhelm install crossplane crossplane-stable/crossplane \\\n  --namespace crossplane-system \\\n  --create-namespace\n```\n\n## Installation prüfen\n```bash\nkubectl get pods -n crossplane-system\nkubectl get deployments -n crossplane-system\nkubectl get crds | grep crossplane\n```\n\n## Erwartetes Ergebnis\nSie sollten Crossplane-Pods sehen, die im Status `Running` sind. Außerdem werden mehrere CRDs installiert, mit denen Crossplane Provider, Packages und Compositions verwaltet.\n\n## Häufige Fehler\n| Problem | Ursache | Lösung |\n|---|---|---|\n| Pods starten nicht | Zu wenig Ressourcen | Cluster mit mehr CPU/RAM starten |\n| Helm Repo nicht erreichbar | Netzwerk/DNS | Internetverbindung prüfen |\n| CRDs fehlen | Installation unvollständig | Helm Release prüfen und neu installieren |\n\n## Deinstallation im Lab\n```bash\nhelm uninstall crossplane -n crossplane-system\nkubectl delete namespace crossplane-system\n```\n\n## Wichtige Punkte\n- Crossplane wird wie ein Kubernetes-Add-on installiert.\n- Helm ist die übliche Installationsmethode.\n- Die Installation fügt CRDs und Controller hinzu.\n- Ohne Provider kann Crossplane noch keine Cloud-Ressourcen erstellen.", "diagram": "installCrossplane"}, {"module": "Kubernetes für Crossplane konfigurieren", "title": "Crossplane-CLI-Tools und Debugging", "content": "# Crossplane-CLI-Tools und Debugging\n\n## Warum Debugging wichtig ist\nCrossplane ist controllerbasiert. Fehler zeigen sich oft als Statusbedingungen, Events oder Provider-Logs. Gute Diagnose beginnt mit `kubectl`.\n\n## Nützliche kubectl-Befehle\n```bash\nkubectl get pods -n crossplane-system\nkubectl logs -n crossplane-system deploy/crossplane\nkubectl get providers\nkubectl describe provider <provider-name>\nkubectl get managed\nkubectl describe <resource-kind> <resource-name>\n```\n\n## Crossplane CLI\nDie Crossplane CLI hilft beim Bauen, Validieren und Veröffentlichen von Packages.\n\n```bash\ncrossplane --help\ncrossplane xpkg --help\n```\n\n## Statusbedingungen lesen\nViele Crossplane-Ressourcen zeigen Conditions wie:\n\n- `Ready`\n- `Synced`\n- `Healthy`\n- `Installed`\n\nBeispiel:\n\n```bash\nkubectl describe provider provider-aws\n```\n\n## Debugging-Methode\n1. Claim prüfen.\n2. Composite Resource prüfen.\n3. Managed Resources prüfen.\n4. ProviderConfig und Secrets prüfen.\n5. Provider-Logs prüfen.\n6. Cloud-API-Fehler interpretieren.\n\n## Typische Ursachen\n- Falsche Credentials\n- Fehlende IAM-Rechte\n- Falsche Region\n- Ungültige YAML-Felder\n- Composition passt nicht zur XRD\n- Provider nicht gesund", "diagram": "debugFlow"}, {"module": "Kubernetes für Crossplane konfigurieren", "title": "Einrichten Ihrer Crossplane-Plattform", "content": "# Einrichten Ihrer Crossplane-Plattform\n\n## Ziel\nNach der Installation richten Sie die Grundstruktur einer Plattform ein: Namespaces, Rollen, ProviderConfigs und erste Plattformkonventionen.\n\n## Namespaces strukturieren\n```bash\nkubectl create namespace platform-system\nkubectl create namespace team-a\nkubectl create namespace team-b\n```\n\n## Verantwortlichkeiten trennen\n| Ebene | Besitzer | Zweck |\n|---|---|---|\n| `crossplane-system` | Plattformteam | Crossplane Core und Provider |\n| `platform-system` | Plattformteam | XRDs, Compositions, Packages |\n| Team-Namespaces | Anwendungsteams | Claims und App-nahe Ressourcen |\n\n## RBAC-Grundidee\nPlattformteams verwalten Provider und Compositions. Entwicklungsteams dürfen nur freigegebene Claims in ihren Namespaces erstellen.\n\n## Beispiel-RBAC-Idee\n```yaml\nkind: Role\napiVersion: rbac.authorization.k8s.io/v1\nmetadata:\n  namespace: team-a\n  name: webapp-claim-user\nrules:\n  - apiGroups: [\"platform.company.com\"]\n    resources: [\"webappclaims\"]\n    verbs: [\"get\", \"list\", \"watch\", \"create\", \"update\", \"delete\"]\n```\n\n## Plattformkonventionen\n- Einheitliche Labels und Tags\n- Standardregionen\n- Namenskonventionen\n- Kosten- und Sicherheitsgrenzen\n- Secrets nur über sichere Mechanismen ausgeben\n\n## Wichtige Punkte\nEine Crossplane-Plattform ist mehr als eine Installation. Sie ist ein Produkt mit klaren APIs, Rollen, Policies und Support-Prozessen.", "diagram": "platformSetup"}, {"module": "Kubernetes für Crossplane konfigurieren", "title": "Quiz zur Kubernetes-Plattformkonfiguration", "content": "# Quiz zur Kubernetes-Plattformkonfiguration\n\n## Frage 1\nWarum benötigt Crossplane Kubernetes-CRDs?\n\n<details><summary>Lösung anzeigen</summary>\nCRDs erweitern die Kubernetes-API um neue Ressourcentypen wie Provider, ProviderConfig, Managed Resources, XRDs und Claims.</details>\n\n## Frage 2\nWarum sollten Teams ihre Claims in eigenen Namespaces erstellen?\n\n<details><summary>Lösung anzeigen</summary>\nNamespaces ermöglichen Isolation, RBAC-Kontrolle, Quotas und klare Verantwortlichkeiten.</details>\n\n## Frage 3\nWelche drei Dinge prüfen Sie zuerst, wenn eine Managed Resource nicht bereit wird?\n\n<details><summary>Lösung anzeigen</summary>\nStatusbedingungen, Events/Describe-Ausgabe und Provider-Logs beziehungsweise ProviderConfig/Credentials.</details>", "diagram": null}, {"module": "AWS-Provider und verwaltete Ressourcen", "title": "Verständnis von Crossplane-Providern", "content": "# Verständnis von Crossplane-Providern\n\n## Was ist ein Provider?\nEin Provider ist ein Kubernetes-Controller-Paket, das weiß, wie eine externe API angesprochen wird. Für AWS bedeutet das: Kubernetes-Ressourcen werden in AWS-API-Aufrufe übersetzt.\n\n## Aufgaben eines Providers\n- CRDs für Cloud-Ressourcen bereitstellen.\n- Externe APIs aufrufen.\n- Zustand kontinuierlich abgleichen.\n- Status und Fehler zurück in Kubernetes schreiben.\n- Credentials über ProviderConfigs nutzen.\n\n## Provider vs. Managed Resource\n| Begriff | Bedeutung |\n|---|---|\n| Provider | Controller, der eine externe Plattform verwaltet |\n| ProviderConfig | Konfiguration und Credentials für den Provider |\n| Managed Resource | Kubernetes-Objekt, das eine konkrete externe Ressource beschreibt |\n\n## Warum Provider wichtig sind\nProvider sind die Brücke zwischen Kubernetes und Cloud. Ohne Provider kann Crossplane keine AWS-, Azure- oder GCP-Ressourcen erstellen.", "diagram": "providerConcept"}, {"module": "AWS-Provider und verwaltete Ressourcen", "title": "Installieren und Konfigurieren von AWS-Providern", "content": "# Installieren und Konfigurieren von AWS-Providern\n\n## Ziel\nInstallieren Sie den AWS Provider und konfigurieren Sie Credentials sicher.\n\n## Provider installieren\nBeispiel mit Upbound AWS Provider:\n\n```yaml\napiVersion: pkg.crossplane.io/v1\nkind: Provider\nmetadata:\n  name: provider-aws-s3\nspec:\n  package: xpkg.upbound.io/upbound/provider-aws-s3:v1.13.0\n```\n\nAnwenden:\n\n```bash\nkubectl apply -f provider-aws-s3.yaml\nkubectl get providers\n```\n\n## AWS-Credentials als Secret\n```bash\nkubectl create secret generic aws-secret \\\n  -n crossplane-system \\\n  --from-file=creds=./aws-credentials.txt\n```\n\nBeispiel `aws-credentials.txt`:\n\n```ini\n[default]\naws_access_key_id = YOUR_ACCESS_KEY\naws_secret_access_key = YOUR_SECRET_KEY\n```\n\n## ProviderConfig erstellen\n```yaml\napiVersion: aws.upbound.io/v1beta1\nkind: ProviderConfig\nmetadata:\n  name: default\nspec:\n  credentials:\n    source: Secret\n    secretRef:\n      namespace: crossplane-system\n      name: aws-secret\n      key: creds\n```\n\n## Prüfen\n```bash\nkubectl get providerconfigs\nkubectl describe providerconfig default\nkubectl get providers\n```\n\n## Sicherheitshinweise\n- Verwenden Sie keine Root-Credentials.\n- Nutzen Sie minimale IAM-Rechte.\n- Rotieren Sie Secrets regelmäßig.\n- In Produktion: External Secrets, IRSA oder Workload Identity bevorzugen.", "diagram": "awsProvider"}, {"module": "AWS-Provider und verwaltete Ressourcen", "title": "Arbeiten mit AWS Managed Resources", "content": "# Arbeiten mit AWS Managed Resources\n\n## Ziel\nErstellen Sie erste AWS-Ressourcen direkt als Kubernetes-Objekte.\n\n## Beispiel: S3-Bucket\n```yaml\napiVersion: s3.aws.upbound.io/v1beta1\nkind: Bucket\nmetadata:\n  name: koffi-crossplane-demo-bucket\nspec:\n  forProvider:\n    region: eu-central-1\n  providerConfigRef:\n    name: default\n```\n\nAnwenden:\n\n```bash\nkubectl apply -f bucket.yaml\nkubectl get bucket\nkubectl describe bucket koffi-crossplane-demo-bucket\n```\n\n## Was passiert im Hintergrund?\n1. Kubernetes speichert das Bucket-Objekt.\n2. Der AWS Provider beobachtet die Ressource.\n3. Der Provider ruft die AWS API auf.\n4. AWS erstellt den Bucket.\n5. Der Provider aktualisiert Status und Conditions.\n\n## Wichtige Felder\n| Feld | Zweck |\n|---|---|\n| `metadata.name` | Name des Kubernetes-Objekts |\n| `spec.forProvider` | Cloud-spezifische Eigenschaften |\n| `providerConfigRef` | Welche Credentials/Config genutzt werden |\n| `status.atProvider` | Tatsächlicher Zustand aus AWS |\n| `conditions` | Ready/Synced-Informationen |\n\n## Löschen\n```bash\nkubectl delete bucket koffi-crossplane-demo-bucket\n```\n\nCrossplane löscht standardmäßig die externe Ressource mit, abhängig von DeletionPolicy und Provider-Verhalten.\n\n## Best Practices\n- Für Lernzwecke Managed Resources direkt nutzen.\n- Für Teams besser Compositions und Claims bereitstellen.\n- DeletionPolicy bewusst setzen.\n- Tags und Labels konsequent verwenden.", "diagram": "managedResources"}, {"module": "Compositions und Plattformabstraktionen", "title": "Verständnis von Compositions und Composite Resources", "content": "# Verständnis von Compositions und Composite Resources\n\n## Warum Compositions?\nManaged Resources sind mächtig, aber oft zu detailliert für Entwicklerteams. Compositions erlauben Plattformteams, mehrere Managed Resources zu einem einfachen Plattformprodukt zu bündeln.\n\n## Grundbegriffe\n| Begriff | Bedeutung |\n|---|---|\n| XRD | Definiert eine neue Plattform-API |\n| Composition | Beschreibt, welche Managed Resources für diese API erstellt werden |\n| Composite Resource (XR) | Instanz dieser Plattform-API |\n| Claim | Namespace-bezogene Anfrage eines Entwicklers |\n\n## Beispielidee\nEin Entwickler fordert an:\n\n```yaml\napiVersion: platform.company.com/v1alpha1\nkind: PostgreSQLInstance\nmetadata:\n  name: orders-db\nspec:\n  size: small\n  environment: dev\n```\n\nDie Plattform erstellt im Hintergrund:\n\n- Subnet Group\n- Security Group\n- RDS Instance\n- Secret mit Verbindungsdetails\n- Tags und Backups nach Standard\n\n## Nutzen\n- Entwicklerfreundliche API.\n- Standardisierte Sicherheits- und Betriebsregeln.\n- Wiederverwendbare Infrastrukturmuster.\n- Weniger Cloud-spezifisches Wissen in Anwendungsteams.", "diagram": "compositionFlow"}, {"module": "Compositions und Plattformabstraktionen", "title": "XRDs und Claims: Plattform-APIs und Multi-Tenancy", "content": "# XRDs und Claims: Plattform-APIs und Multi-Tenancy\n\n## Ziel\nVerstehen, wie Plattformteams eigene APIs definieren und Entwicklungsteams diese sicher nutzen.\n\n## XRD-Beispiel\n```yaml\napiVersion: apiextensions.crossplane.io/v1\nkind: CompositeResourceDefinition\nmetadata:\n  name: xwebapps.platform.company.com\nspec:\n  group: platform.company.com\n  names:\n    kind: XWebApp\n    plural: xwebapps\n  claimNames:\n    kind: WebApp\n    plural: webapps\n  versions:\n    - name: v1alpha1\n      served: true\n      referenceable: true\n      schema:\n        openAPIV3Schema:\n          type: object\n          properties:\n            spec:\n              type: object\n              properties:\n                environment:\n                  type: string\n                size:\n                  type: string\n```\n\n## Claim-Beispiel\n```yaml\napiVersion: platform.company.com/v1alpha1\nkind: WebApp\nmetadata:\n  name: my-app\n  namespace: team-a\nspec:\n  environment: dev\n  size: small\n```\n\n## Multi-Tenancy\nClaims sind namespaced. Dadurch können Teams ihre Infrastruktur in eigenen Namespaces anfordern, während Plattformteams die Composition zentral kontrollieren.\n\n## RBAC-Pattern\n- Entwickler dürfen Claims erstellen.\n- Plattformteam verwaltet XRDs und Compositions.\n- Security-Team definiert Richtlinien.\n- Produktion erhält strengere Rollen und Reviews.", "diagram": "xrdClaims"}, {"module": "Compositions und Plattformabstraktionen", "title": "Compositions mit Patch und Transform erstellen", "content": "# Compositions mit Patch und Transform erstellen\n\n## Ziel\nPatches verbinden Felder Ihrer Plattform-API mit Feldern der Managed Resources. Transforms ändern Werte, bevor sie weitergegeben werden.\n\n## Einfaches Patch-Beispiel\n```yaml\npatches:\n  - type: FromCompositeFieldPath\n    fromFieldPath: spec.region\n    toFieldPath: spec.forProvider.region\n```\n\n## Transform-Beispiel\n```yaml\npatches:\n  - type: FromCompositeFieldPath\n    fromFieldPath: spec.size\n    toFieldPath: spec.forProvider.instanceClass\n    transforms:\n      - type: map\n        map:\n          small: db.t3.micro\n          medium: db.t3.small\n          large: db.t3.medium\n```\n\n## Häufige Patch-Muster\n| Muster | Zweck |\n|---|---|\n| FromCompositeFieldPath | Werte aus XR in Managed Resource kopieren |\n| ToCompositeFieldPath | Status aus Managed Resource zurück in XR schreiben |\n| CombineFromComposite | Mehrere Felder zu einem Wert kombinieren |\n| Map Transform | Abstrakte Größen in konkrete Cloud-Werte übersetzen |\n| String Transform | Namen, Tags oder IDs zusammensetzen |\n\n## Best Practices\n- API einfach halten.\n- Cloud-spezifische Details in der Composition verstecken.\n- Transforms nutzen, um Plattformstandards durchzusetzen.\n- Statusfelder zurückpatchen, damit Claims verständlich bleiben.", "diagram": "patchTransform"}, {"module": "Compositions und Plattformabstraktionen", "title": "Verbindungsdetails für sicheres Anmeldeinformationsmanagement", "content": "# Verbindungsdetails für sicheres Anmeldeinformationsmanagement\n\n## Warum Connection Details?\nViele Infrastrukturressourcen erzeugen Zugangsdaten, Endpunkte oder Ports. Crossplane kann diese Informationen aus Managed Resources sammeln und als Kubernetes Secret bereitstellen.\n\n## Typische Informationen\n- Datenbank-Endpoint\n- Benutzername\n- Passwort\n- Port\n- Connection String\n\n## Beispielidee\n```yaml\nwriteConnectionSecretToRef:\n  name: orders-db-connection\n  namespace: team-a\n```\n\n## Composition-Ausschnitt\n```yaml\nconnectionDetails:\n  - fromConnectionSecretKey: username\n  - fromConnectionSecretKey: password\n  - fromFieldPath: status.atProvider.endpoint\n    name: endpoint\n```\n\n## Sicherheitsprinzipien\n- Secrets nur in den Team-Namespace schreiben.\n- RBAC strikt setzen.\n- Keine Secrets in Git committen.\n- External Secrets oder Secret Stores für Produktion erwägen.\n- Rotation und Löschung planen.\n\n## Wichtige Punkte\nConnection Details sind der Übergang zwischen Infrastruktur und Anwendung. Sie müssen sicher, automatisiert und teamgerecht bereitgestellt werden.", "diagram": "connectionSecrets"}, {"module": "Compositions und Plattformabstraktionen", "title": "Ihre erste Composition erstellen", "content": "# Ihre erste Composition erstellen\n\n## Ziel\nSie erstellen ein einfaches Plattformprodukt, das Entwickler über einen Claim anfordern können.\n\n## Schritt 1: API definieren\nDefinieren Sie eine XRD für eine einfache `XBucket`-Ressource.\n\n```yaml\napiVersion: apiextensions.crossplane.io/v1\nkind: CompositeResourceDefinition\nmetadata:\n  name: xbuckets.platform.company.com\nspec:\n  group: platform.company.com\n  names:\n    kind: XBucket\n    plural: xbuckets\n  claimNames:\n    kind: Bucket\n    plural: buckets\n  versions:\n    - name: v1alpha1\n      served: true\n      referenceable: true\n      schema:\n        openAPIV3Schema:\n          type: object\n          properties:\n            spec:\n              type: object\n              properties:\n                region:\n                  type: string\n```\n\n## Schritt 2: Composition definieren\n```yaml\napiVersion: apiextensions.crossplane.io/v1\nkind: Composition\nmetadata:\n  name: xbuckets.aws.platform.company.com\nspec:\n  compositeTypeRef:\n    apiVersion: platform.company.com/v1alpha1\n    kind: XBucket\n  resources:\n    - name: bucket\n      base:\n        apiVersion: s3.aws.upbound.io/v1beta1\n        kind: Bucket\n        spec:\n          forProvider:\n            region: eu-central-1\n          providerConfigRef:\n            name: default\n      patches:\n        - type: FromCompositeFieldPath\n          fromFieldPath: spec.region\n          toFieldPath: spec.forProvider.region\n```\n\n## Schritt 3: Claim erstellen\n```yaml\napiVersion: platform.company.com/v1alpha1\nkind: Bucket\nmetadata:\n  name: app-assets\n  namespace: team-a\nspec:\n  region: eu-central-1\n```\n\n## Prüfen\n```bash\nkubectl get buckets -n team-a\nkubectl get xbuckets\nkubectl get bucket.s3.aws.upbound.io\n```\n\n## Ergebnis\nEntwickler erhalten eine einfache API. Plattformteams behalten Kontrolle über Provider, Standards und Details.", "diagram": "firstComposition"}, {"module": "Paketierung und Bereitstellung", "title": "Einführung in Configuration Packages", "content": "# Einführung in Configuration Packages\n\n## Warum Packages?\nEine Plattform besteht aus XRDs, Compositions, Functions und optionalen Dependencies. Configuration Packages bündeln diese Artefakte versioniert und installierbar.\n\n## Vorteile\n- Wiederverwendbarkeit\n- Versionierung\n- Distribution über OCI-Registries\n- Abhängigkeiten definieren\n- Plattformstandards als Produkt veröffentlichen\n\n## Paketinhalt\nEin Package kann enthalten:\n\n- Composite Resource Definitions\n- Compositions\n- Composition Functions\n- Provider-Abhängigkeiten\n- Beispiel-Claims\n- Dokumentation\n\n## Denkweise\nEin Configuration Package ist wie ein Helm Chart für Ihre Plattform-APIs – aber speziell für Crossplane-Plattformbausteine.", "diagram": "packageIntro"}, {"module": "Paketierung und Bereitstellung", "title": "Configuration Packages erstellen und bereitstellen", "content": "# Configuration Packages erstellen und bereitstellen\n\n## Projektstruktur\n```text\nplatform-config/\n├── crossplane.yaml\n├── apis/\n│   └── xbucket.yaml\n├── compositions/\n│   └── xbucket-aws.yaml\n└── examples/\n    └── bucket-claim.yaml\n```\n\n## crossplane.yaml\n```yaml\napiVersion: meta.pkg.crossplane.io/v1\nkind: Configuration\nmetadata:\n  name: platform-config\nspec:\n  crossplane:\n    version: \">=v1.14.0\"\n  dependsOn:\n    - provider: xpkg.upbound.io/upbound/provider-aws-s3\n      version: \">=v1.13.0\"\n```\n\n## Package bauen\n```bash\ncrossplane xpkg build --package-root=. --package-file=platform-config.xpkg\n```\n\n## Package veröffentlichen\n```bash\ncrossplane xpkg push registry.example.com/platform/platform-config:v0.1.0 \\\n  --package-files=platform-config.xpkg\n```\n\n## Installation im Cluster\n```yaml\napiVersion: pkg.crossplane.io/v1\nkind: Configuration\nmetadata:\n  name: platform-config\nspec:\n  package: registry.example.com/platform/platform-config:v0.1.0\n```\n\n## Best Practices\n- Semantische Versionierung verwenden.\n- Breaking Changes dokumentieren.\n- Examples und Tests mitliefern.\n- Pakete in einer vertrauenswürdigen Registry hosten.", "diagram": "packageBuild"}, {"module": "Paketierung und Bereitstellung", "title": "Image-Konfigurationen für das Paketmanagement", "content": "# Image-Konfigurationen für das Paketmanagement\n\n## Ziel\nVerstehen, wie OCI-Images für Crossplane-Packages genutzt werden.\n\n## Warum OCI?\nCrossplane Packages können in OCI-kompatiblen Registries gespeichert werden. Dadurch passen sie gut in bestehende Container-Registry- und Supply-Chain-Prozesse.\n\n## Typische Registries\n- GitHub Container Registry\n- GitLab Container Registry\n- Harbor\n- AWS ECR\n- Azure Container Registry\n- Google Artifact Registry\n\n## Versionierungsstrategie\n| Tag | Bedeutung |\n|---|---|\n| `v0.1.0` | Feste Version für reproduzierbare Installationen |\n| `v0.1.x` | Patch-kompatible Linie |\n| `latest` | Nur für Labs, nicht für Produktion |\n\n## Produktionshinweise\n- Signierung und Verifikation verwenden.\n- Immutable Tags bevorzugen.\n- Vulnerability Scans aktivieren.\n- Rollen für Push/Pull trennen.", "diagram": "ociRegistry"}, {"module": "Paketierung und Bereitstellung", "title": "Crossplane-Compositions paketieren und deployen", "content": "# Crossplane-Compositions paketieren und deployen\n\n## Ziel\nIhre Compositions werden von lokalen YAML-Dateien zu einem installierbaren Plattformprodukt.\n\n## Pipeline-Idee\n1. YAML validieren.\n2. Package bauen.\n3. Package in Registry pushen.\n4. Staging-Cluster installiert neue Version.\n5. Tests mit Beispiel-Claims ausführen.\n6. Produktion aktualisieren.\n\n## Beispiel-CI-Pipeline\n```yaml\nstages:\n  - validate\n  - build\n  - publish\n  - deploy\n```\n\n## Deployment-Prinzip\nPlattformteams installieren Packages als Crossplane `Configuration`. Entwicklungsteams nutzen anschließend nur noch die bereitgestellten Claims.\n\n## Upgrade-Strategie\n- Neue API-Versionen parallel bereitstellen.\n- Alte Claims weiter unterstützen.\n- Migration dokumentieren.\n- Rollback-Pfad vorbereiten.\n\n## Wichtige Punkte\nPaketierung macht Plattformbausteine reproduzierbar, teilbar und sicher betreibbar.", "diagram": "packageDeploy"}, {"module": "Paketierung und Bereitstellung", "title": "Konzepte zu Paketierung und Bereitstellung", "content": "# Konzepte zu Paketierung und Bereitstellung\n\n## Zusammenfassung\nConfiguration Packages machen Ihre Plattform wiederverwendbar. Sie verwandeln einzelne YAML-Dateien in ein verteilbares Produkt.\n\n## Kernkonzepte\n- Packages bündeln XRDs und Compositions.\n- OCI-Registries ermöglichen Verteilung.\n- Versionierung reduziert Risiko.\n- Dependencies stellen Provider-Anforderungen sicher.\n- GitOps kann Package-Installationen automatisieren.\n\n## Quiz\n### Was ist der größte Vorteil von Packages?\n<details><summary>Lösung anzeigen</summary>Sie machen Plattform-APIs versionierbar, wiederverwendbar und standardisiert installierbar.</details>\n\n### Warum sollte `latest` nicht in Produktion verwendet werden?\n<details><summary>Lösung anzeigen</summary>Weil Installationen dadurch nicht reproduzierbar sind und unerwartete Änderungen in Produktion gelangen können.</details>", "diagram": null}, {"module": "Erweiterte Funktionen", "title": "Einführung in Composition Functions", "content": "# Einführung in Composition Functions\n\n## Was sind Composition Functions?\nComposition Functions erweitern die klassische Patch-and-Transform-Logik. Sie ermöglichen programmierbare Logik innerhalb des Composition-Prozesses.\n\n## Warum Functions?\nPatch-and-Transform ist gut für einfache Mappings. Für komplexe Entscheidungen, Schleifen, dynamische Ressourcenlisten oder externe Datenquellen werden Functions nützlich.\n\n## Typische Einsatzfälle\n- Dynamische Ressourcenerstellung.\n- Komplexe Namenslogik.\n- Policy-basierte Auswahl.\n- Mehrere Cloud-Varianten aus einer API.\n- Validierung oder Enrichment von Eingaben.\n\n## Pipeline-Modell\nEine Composition kann als Pipeline von Functions aufgebaut werden. Jede Function erhält den aktuellen gewünschten Zustand und gibt eine veränderte Version zurück.\n\n## Wichtig\nFunctions sollten Plattformlogik vereinfachen, nicht unverständlich machen. Nutzen Sie sie gezielt.", "diagram": "functionsIntro"}, {"module": "Erweiterte Funktionen", "title": "Erweiterte Composition Functions", "content": "# Erweiterte Composition Functions\n\n## Fortgeschrittene Muster\n### 1. Environment-spezifische Ressourcen\nEine Function kann abhängig von `spec.environment` unterschiedliche Ressourcen erzeugen.\n\n### 2. Multi-Region-Topologien\nFür Produktion können Ressourcen in mehreren Regionen oder Availability Zones erzeugt werden.\n\n### 3. Policy-Enrichment\nEingaben werden automatisch mit Standards ergänzt: Tags, Verschlüsselung, Backup-Konfiguration.\n\n### 4. Externe Datenquellen\nFunctions können Informationen aus externen Systemen nutzen, wenn das Architekturmodell dies zulässt.\n\n## Beispielhafte Denkweise\n```text\nInput Claim → Function Pipeline → erzeugte Managed Resources → Provider → Cloud\n```\n\n## Best Practices\n- Functions versionieren.\n- Kleine, testbare Functions bevorzugen.\n- Klare Verantwortlichkeiten definieren.\n- Observability für Functions einplanen.\n- Nicht jede Composition braucht Functions.\n\n## Anti-Pattern\n- Business-Logik in Functions verstecken.\n- Ungetestete dynamische Ressourcen in Produktion einsetzen.\n- Zu viele Sonderfälle in einer Function bündeln.", "diagram": "advancedFunctions"}, {"module": "Erweiterte Funktionen", "title": "Quiz zu erweiterten Funktionen", "content": "# Quiz zu erweiterten Funktionen\n\n## Frage 1\nWann reichen Patch & Transform nicht mehr aus?\n<details><summary>Lösung anzeigen</summary>Wenn komplexe Logik, dynamische Ressourcenlisten, externe Datenquellen oder mehrere Entscheidungspfade benötigt werden.</details>\n\n## Frage 2\nWarum sollten Functions klein und testbar sein?\n<details><summary>Lösung anzeigen</summary>Weil sie sonst schwer zu debuggen, schwer zu versionieren und riskant für Plattformstabilität werden.</details>", "diagram": null}, {"module": "GitOps-Betrieb", "title": "GitOps-Grundlagen und Einrichtung", "content": "# GitOps-Grundlagen und Einrichtung\n\n## Was ist GitOps?\nGitOps bedeutet, dass Git die Quelle der Wahrheit für den gewünschten Zustand ist. Controller wie Argo CD oder Flux synchronisieren den Cluster automatisch mit Git.\n\n## Warum GitOps für Crossplane?\nCrossplane-Ressourcen sind Kubernetes-Manifeste. Dadurch lassen sich Provider, ProviderConfigs, XRDs, Compositions und Claims mit denselben GitOps-Praktiken verwalten wie Anwendungen.\n\n## Grundstruktur\n```text\ngitops-repo/\n├── platform/\n│   ├── providers/\n│   ├── xrds/\n│   └── compositions/\n└── teams/\n    ├── team-a/\n    └── team-b/\n```\n\n## Setup-Idee mit Argo CD\n- Argo CD installiert Provider und Plattformpakete.\n- Plattformteam reviewed Änderungen per Pull Request.\n- Teams committen Claims in eigene Verzeichnisse.\n- Sync-Status zeigt Drift und Fehler.\n\n## Wichtige Prinzipien\n- Git ist Quelle der Wahrheit.\n- Änderungen erfolgen über Pull Requests.\n- Automatisierte Synchronisation.\n- Rollback über Git-History.", "diagram": "gitopsBasics"}, {"module": "GitOps-Betrieb", "title": "GitOps-Betrieb und -Verwaltung", "content": "# GitOps-Betrieb und -Verwaltung\n\n## Betriebsmodell\nEin GitOps-Betrieb muss klare Verantwortlichkeiten definieren.\n\n| Bereich | Verantwortlich |\n|---|---|\n| Provider und Credentials | Plattformteam / Security |\n| XRDs und Compositions | Plattformteam |\n| Claims | Anwendungsteams |\n| Policies | Security / Platform |\n| Monitoring | Operations / Platform |\n\n## Betriebsaufgaben\n- Sync-Status überwachen.\n- Fehlgeschlagene Claims untersuchen.\n- Provider-Versionen aktualisieren.\n- Package-Versionen kontrolliert ausrollen.\n- Ressourcenverbrauch und Kosten beobachten.\n\n## Drift-Handling\nCrossplane reconciled externe Ressourcen. GitOps reconciled Kubernetes-Manifeste. Zusammen entsteht eine starke Kette:\n\n```text\nGit → Kubernetes → Crossplane → Cloud\n```\n\n## Risiken\n- Secrets falsch in Git abgelegt.\n- Automatischer Sync ohne Review in Produktion.\n- Provider-Upgrades ohne Test.\n- Claims löschen versehentlich produktive Infrastruktur.\n\n## Schutzmaßnahmen\n- Branch Protection.\n- Separate Environments.\n- Preview und Staging.\n- RBAC und Admission Policies.\n- Manuelle Gates für Produktion.", "diagram": "gitopsOps"}, {"module": "GitOps-Betrieb", "title": "GitOps mit Crossplane", "content": "# GitOps mit Crossplane\n\n## Zielbild\nEntwicklungsteams erstellen Claims als YAML in Git. Argo CD oder Flux synchronisiert diese Claims in den Cluster. Crossplane erstellt die Infrastruktur.\n\n## Beispiel-Claim im Team-Repo\n```yaml\napiVersion: platform.company.com/v1alpha1\nkind: WebApp\nmetadata:\n  name: payments\n  namespace: team-payments\nspec:\n  environment: staging\n  size: medium\n  database: postgresql\n```\n\n## GitOps-Flow\n1. Entwickler erstellt Pull Request.\n2. Team und Plattformregeln prüfen den Claim.\n3. Merge in Main.\n4. Argo CD synchronisiert.\n5. Crossplane erstellt Managed Resources.\n6. Status und Secrets werden im Cluster bereitgestellt.\n\n## Vorteile\n- Vollständige Änderungsnachverfolgung.\n- Self-Service ohne Tickets.\n- Konsistente Deployments.\n- Auditierbarkeit.\n- Schneller Rollback.\n\n## Produktionsmuster\n- Claims pro Namespace.\n- Produktive Claims mit Review-Gates.\n- Separate Plattform- und Team-Repositories.\n- Observability-Dashboards für Claims und Managed Resources.", "diagram": "gitopsCrossplane"}, {"module": "Crossplane v2.0", "title": "Crossplane v2.0: Evolution und Migration", "content": "# Crossplane v2.0: Evolution und Migration\n\n## Warum v2.0 wichtig ist\nCrossplane entwickelt sich weiter, um Platform Engineering noch stärker an Kubernetes-native Betriebsmodelle anzupassen. Ein wichtiges Thema ist der Übergang zu namespaced Composite Resources und vereinfachten Self-Service-Modellen.\n\n## Wichtige Evolutionslinien\n- Bessere Namespace-Orientierung.\n- Klarere Multi-Tenancy-Modelle.\n- Verbesserte Operational Workflows.\n- Stärkere Plattform-API-Fokussierung.\n- Migration von älteren Claim-Modellen zu neuen Mustern.\n\n## Ziel der Migration\n- Weniger Komplexität für Teams.\n- Bessere Isolation.\n- Einfacheres RBAC.\n- Klarere Ownership.\n- Besserer Betrieb in großen Organisationen.\n\n## Migrationsprinzipien\n- Bestehende APIs inventarisieren.\n- Claims und XRs analysieren.\n- Neue namespaced XR-Strategie definieren.\n- Staging-Migration durchführen.\n- Schrittweise produktive Migration.\n- Rollback vorbereiten.", "diagram": "v2Evolution"}, {"module": "Crossplane v2.0", "title": "Von Claims zu namensraumbezogenen Composite Resources", "content": "# Von Claims zu namensraumbezogenen Composite Resources\n\n## Hintergrund\nIn älteren Modellen wurden Claims oft als namespaced Entwickler-Anfragen genutzt, während Composite Resources clusterweit waren. Neuere Modelle bewegen sich stärker in Richtung namespaced Composite Resources.\n\n## Warum namespaced XRs?\n- Klarere Mandantenfähigkeit.\n- Einfacheres RBAC.\n- Bessere Ownership.\n- Weniger indirekte Ressourcenbeziehungen.\n- Kubernetes-nativeres Modell.\n\n## Vergleich\n| Früheres Muster | Namespaced XR-Muster |\n|---|---|\n| Claim im Team-Namespace | XR direkt im Team-Namespace |\n| Clusterweite XR dahinter | Ownership direkt sichtbar |\n| Mehr indirekte Zuordnung | Einfacheres Debugging |\n| Getrennte Claim/XR-Konzepte | Einheitlichere API-Nutzung |\n\n## Migrationsempfehlung\n- Nicht alle APIs gleichzeitig migrieren.\n- Neue APIs namespaced planen.\n- Bestehende Claims zunächst unterstützen.\n- Dokumentation und Beispiele aktualisieren.\n- Teams früh einbinden.", "diagram": "namespacedXR"}, {"module": "Crossplane v2.0", "title": "Operationen: Mehr als nur Infrastruktur-Bereitstellung", "content": "# Operationen: Mehr als nur Infrastruktur-Bereitstellung\n\n## Neue Perspektive\nPlatform Engineering endet nicht mit dem Erstellen von Infrastruktur. Eine Plattform muss auch operative Workflows abbilden: Backups, Rotationen, Upgrades, Reparaturen und Migrationen.\n\n## Beispiele operativer Workflows\n- Datenbankpasswort rotieren.\n- Backup wiederherstellen.\n- Version einer Datenbank aktualisieren.\n- Größe einer Ressource ändern.\n- Zertifikate erneuern.\n- Temporäre Debug-Zugänge erzeugen.\n\n## Crossplane-Denkweise\nOperative Workflows können ebenfalls deklarativ und API-gesteuert modelliert werden. Teams fordern nicht nur Ressourcen an, sondern auch kontrollierte Aktionen.\n\n## Plattformvorteil\n- Wiederholbare Betriebsprozesse.\n- Weniger manuelle Tickets.\n- Klare Audit-Spur.\n- Standardisierte Sicherheitsregeln.\n- Schnellere Reaktion auf Routineaufgaben.", "diagram": "operations"}, {"module": "Crossplane v2.0", "title": "Crossplane v2.0 Migrationslabor", "content": "# Crossplane v2.0 Migrationslabor\n\n## Ziel\nPlanen und simulieren Sie eine Migration von Claim-basierten APIs zu namespaced Composite Resources.\n\n## Aufgabe 1: Bestand aufnehmen\nListen Sie vorhandene XRDs, Compositions und Claims:\n\n```bash\nkubectl get xrds\nkubectl get compositions\nkubectl get claims --all-namespaces\n```\n\n## Aufgabe 2: API priorisieren\nBewerten Sie:\n\n- Welche APIs werden aktiv genutzt?\n- Welche sind kritisch?\n- Welche Teams nutzen sie?\n- Welche Ressourcen entstehen daraus?\n\n## Aufgabe 3: Namespaced Zielmodell entwerfen\nDefinieren Sie ein neues API-Modell, das in Team-Namespaces funktioniert.\n\n## Aufgabe 4: Staging testen\nErstellen Sie Test-Claims beziehungsweise namespaced XRs in einem Staging-Namespace.\n\n## Aufgabe 5: Migration dokumentieren\nDokumentieren Sie:\n\n- Alte API\n- Neue API\n- Migrationsschritte\n- Rollback\n- Verantwortliche Personen\n\n## Erfolgskriterien\n- Neue Ressourcen können erstellt werden.\n- Teams haben passende RBAC-Rechte.\n- Bestehende Ressourcen sind nicht gefährdet.\n- Monitoring und Debugging funktionieren.", "diagram": "migrationLab"}, {"module": "Crossplane v2.0", "title": "Bewertung der Crossplane v2.0 Konzepte", "content": "# Bewertung der Crossplane v2.0 Konzepte\n\n## Reflexionsfragen\n1. Warum verbessern namespaced XRs Multi-Tenancy?\n2. Welche Risiken entstehen bei Migrationen?\n3. Wie können operative Workflows als Plattform-APIs modelliert werden?\n4. Warum ist RBAC bei Crossplane-Plattformen so wichtig?\n5. Welche Rolle spielt GitOps bei Migrationen?\n\n## Abschlussbewertung\nSie sollten jetzt erklären können:\n\n- wie Crossplane als universelle Control Plane funktioniert,\n- wie Provider und Managed Resources Cloud-APIs anbinden,\n- wie Compositions Plattformabstraktionen ermöglichen,\n- wie Packages Plattformbausteine verteilen,\n- wie GitOps den Betrieb stabilisiert,\n- warum Crossplane v2.0 stärker auf namespaced Plattformmodelle setzt.\n\n## Nächste Schritte\n- Eigene WebApp-XRD entwerfen.\n- AWS Provider in einem Lab-Cluster installieren.\n- Eine Composition paketieren.\n- GitOps-Repository für Claims aufbauen.\n- Migrationen kontrolliert in Staging üben.", "diagram": "assessment"}];

function escapeHtml(s){return s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function inline(s){ return escapeHtml(s)
 .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
 .replace(/`([^`]+)`/g,'<code>$1</code>')
 .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>'); }
function highlight(code,lang){
  let h=escapeHtml(code);
  if(/yaml|yml/.test(lang)){
    h=h.replace(/(^|\n)(\s*[-\w]+)(:)/g,'$1<span class="kw">$2</span>$3')
       .replace(/("[^"]*"|'[^']*')/g,'<span class="str">$1</span>');
  } else if(/bash|sh/.test(lang)){
    h=h.replace(/(#.*)$/gm,'<span class="com">$1</span>')
       .replace(/\b(kubectl|helm|crossplane|kind|minikube|aws|echo|export|cat|grep)\b/g,'<span class="kw">$1</span>');
  } else {
    h=h.replace(/(#.*)$/gm,'<span class="com">$1</span>')
       .replace(/\b(apiVersion|kind|metadata|spec|resources|patches|transforms|providerConfigRef|forProvider|name|namespace|type|properties|default|description|region)\b/g,'<span class="kw">$1</span>')
       .replace(/("[^"]*"|'[^']*')/g,'<span class="str">$1</span>');
  }
  return h;
}
function codeCopyLabel(){ return {de:'Kopieren',fr:'Copier',en:'Copy'}[state.lang]||'Copy'; }
function codeCopiedLabel(){ return {de:'Kopiert!',fr:'Copié !',en:'Copied!'}[state.lang]||'Copied!'; }
function cbEnc(s){ try{return btoa(unescape(encodeURIComponent(s)));}catch(e){return '';} }
function cbDec(s){ try{return decodeURIComponent(escape(atob(s||'')));}catch(e){return '';} }
function codeBlock(raw,lang){ const tag=lang||'Code'; return '<div class="code-block"><div class="code-bar"><span class="code-lang"><i class="fa-solid fa-code"></i> '+escapeHtml(tag)+'</span><button type="button" class="code-copy" data-code="'+cbEnc(raw)+'"><i class="fa-regular fa-copy"></i> <span>'+codeCopyLabel()+'</span></button></div><pre><code>'+highlight(raw,lang)+'</code></pre></div>'; }
function cbFallback(text,cb){ try{ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }catch(e){} cb&&cb(); }
document.addEventListener('click', function(e){ const btn=e.target.closest('.code-copy'); if(!btn) return; const raw=cbDec(btn.dataset.code||''); const mark=function(){ const sp=btn.querySelector('span'); const old=sp?sp.textContent:''; if(sp) sp.textContent=codeCopiedLabel(); btn.classList.add('copied'); clearTimeout(btn.__ct); btn.__ct=setTimeout(function(){ if(sp) sp.textContent=old; btn.classList.remove('copied'); },1500); }; if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(raw).then(mark).catch(function(){cbFallback(raw,mark);}); } else { cbFallback(raw,mark); } });
function markdown(md){
  const lines=md.split(/\r?\n/);
  let out='', inCode=false, code=[], lang='', list=null, table=[];
  function flushList(){ if(list){ out+=`</${list}>`; list=null; } }
  function flushTable(){
    if(table.length){
      out+='<table>';
      table.forEach((row,i)=>{
        if(i===1 && row.every(c=>/^:?-{3,}:?$/.test(c.trim()))) return;
        const tag=(i===0?'th':'td');
        out+='<tr>'+row.map(c=>`<${tag}>${inline(c.trim())}</${tag}>`).join('')+'</tr>';
      });
      out+='</table>'; table=[];
    }
  }
  for(const raw of lines){
    let line=raw;
    const fence=line.match(/^```(\w+)?\s*$/);
    if(fence){
      if(!inCode){ flushList(); flushTable(); inCode=true; lang=fence[1]||''; code=[]; }
      else { out+=codeBlock(code.join('\n'),lang); inCode=false; }
      continue;
    }
    if(inCode){ code.push(line); continue; }
    if(!line.trim()){ flushList(); flushTable(); continue; }
    if(/^\|.+\|$/.test(line.trim())){ flushList(); table.push(line.trim().slice(1,-1).split('|')); continue; }
    else flushTable();
    const h=line.match(/^(#{1,4})\s+(.+)$/);
    if(h){ flushList(); out+=`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; continue; }
    if(/^---+$/.test(line.trim())){ flushList(); out+='<hr>'; continue; }
    if(/^<details>|^<summary>|^<\/summary>|^<\/details>/.test(line.trim())){ flushList(); out+=line; continue; }
    const ul=line.match(/^\s*[-*]\s+(.+)$/);
    if(ul){ if(list!=='ul'){ flushList(); list='ul'; out+='<ul>'; } out+=`<li>${inline(ul[1])}</li>`; continue; }
    const ol=line.match(/^\s*\d+\.\s+(.+)$/);
    if(ol){ if(list!=='ol'){ flushList(); list='ol'; out+='<ol>'; } out+=`<li>${inline(ol[1])}</li>`; continue; }
    flushList();
    const bq=line.match(/^>\s*(.+)$/);
    if(bq) out+=`<blockquote>${inline(bq[1])}</blockquote>`;

function wrap(ctx,text,x,y,max,lineH){
  const parts=String(text).split('\n');
  parts.forEach((part,pi)=>{
    let words=part.split(' '), line='';
    for(const word of words){
      let test=line?line+' '+word:word;
      if(ctx.measureText(test).width>max && line){ ctx.fillText(line,x,y); y+=lineH; line=word; }
      else line=test;
    }
    if(line){ ctx.fillText(line,x,y); y+=lineH; }
    if(pi<parts.length-1)y+=lineH;
  });
}

document.addEventListener('mousemove',e=>{const target=e.target.closest('[data-tip]'); if(target){els.tooltip.textContent=target.dataset.tip; els.tooltip.style.left=e.clientX+'px'; els.tooltip.style.top=e.clientY+'px'; els.tooltip.style.opacity=1;} else els.tooltip.style.opacity=0;});
init();
</script>

/* kl-drop */
function klToggle(){var p=document.getElementById('klPanel'),b=document.getElementById('klBtn');if(!p)return;var o=p.classList.toggle('open');b.setAttribute('aria-expanded',String(o));}
function klClose(){var p=document.getElementById('klPanel'),b=document.getElementById('klBtn');if(p)p.classList.remove('open');if(b)b.setAttribute('aria-expanded','false');}
function klSync(l){var M={de:'fi-de',en:'fi-gb',fr:'fi-fr'};var f=document.getElementById('klFlag'),c=document.getElementById('klCode');if(f)f.className='fi '+(M[l]||'fi-de');if(c)c.textContent=l.toUpperCase();document.querySelectorAll('#klPanel .kl-item').forEach(function(i){i.classList.toggle('kl-on',i.getAttribute('data-lang')===l);});}
function klPick(l){klClose();setLanguage(l);}
document.addEventListener('click',function(e){var d=document.getElementById('klDrop');if(d&&!d.contains(e.target))klClose();});

function setLanguage(lang) {
  if (!i18n[lang]) return;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (i18n[lang][key] !== undefined) { el.textContent = i18n[lang][key]; }
  });
  klSync(lang);
  document.documentElement.lang = lang;
  localStorage.setItem('preferred-lang', lang);
  // Also sync the hidden select for the existing lesson system
  var sel = document.getElementById('languageSelect');
  if (sel && sel.value !== lang) { sel.value = lang; sel.dispatchEvent(new Event('change')); }
}

document.addEventListener('DOMContentLoaded', function() {
  var saved = localStorage.getItem('preferred-lang') || 'de';
  setLanguage(saved);
});
</script>
