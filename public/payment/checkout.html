<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
  <link rel="shortcut icon" href="../assets/images/logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="page-title">Paiement – Koffi Academy</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#07294d,#0d3d73);font-family:Inter,system-ui,-apple-system,'Segoe UI',sans-serif;display:grid;place-items:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:34px 30px;max-width:440px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.25)}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.logo{font-size:21px;font-weight:900;color:#07294d;white-space:nowrap}.logo span{color:#f89035}
.lang-switcher{display:inline-flex;gap:4px;background:#f0f4f8;border-radius:8px;padding:3px}
.lang-btn{border:none;background:transparent;border-radius:5px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;color:#5a6a8a;transition:.15s}
.lang-btn.active,.lang-btn:hover{background:#07294d;color:#fff}
.course-badge{display:flex;align-items:center;gap:8px;background:#f0f4f8;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;color:#07294d;margin-bottom:16px}
.course-badge i{color:#f89035}
h1{font-size:20px;font-weight:800;color:#07294d;margin-bottom:8px;line-height:1.3}
.price{font-size:34px;font-weight:900;color:#07294d;margin-bottom:6px}
.price small{font-size:15px;color:#6b7280;font-weight:500}
.access-note{font-size:12.5px;color:#64748b;margin-bottom:22px}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin:0 0 12px}
.btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:.18s;text-decoration:none}
.btn:hover{transform:translateY(-2px)}
.btn-paypal{background:#0070ba;color:#fff;box-shadow:0 6px 18px rgba(0,112,186,.35)}
.btn-paypal:hover{background:#005ea6}
.btn-paypal i{font-size:19px}
.btn-bank{background:#f0f4f8;color:#07294d;border:1px solid #d1d5db}
.secure{font-size:11.5px;color:#9ca3af;text-align:center;margin-top:9px}
.divider{display:flex;align-items:center;gap:10px;color:#9ca3af;font-size:12.5px;margin:18px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
.back{display:block;text-align:center;color:#6b7280;font-size:13px;margin-top:20px;text-decoration:none}
.back:hover{color:#07294d}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo">Koffi <span>Academy</span></div>
    <div class="lang-switcher" role="group">
      <button type="button" class="lang-btn active" data-lang="fr" onclick="setLanguage('fr')">FR</button>
      <button type="button" class="lang-btn" data-lang="de" onclick="setLanguage('de')">DE</button>
      <button type="button" class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
    </div>
  </div>

  <div class="course-badge"><i class="fas fa-flask"></i> <span data-i18n="lab">Laboratoire</span></div>
  <h1 id="course-title">—</h1>
  <div class="price"><span id="course-price">—</span> <small id="course-currency">EUR</small></div>
  <p class="access-note" data-i18n="access-note">Accès unique au contenu du laboratoire (vidéos + environnement).</p>

  <!-- PAYPAL — priorité, toujours visible -->
  <p class="sec-label"><i class="fab fa-paypal" style="color:#0070ba"></i> <span data-i18n="paypal-heading">Paiement sécurisé</span></p>
  <a id="paypal-btn" class="btn btn-paypal" href="#"><i class="fab fa-paypal"></i> <span data-i18n="btn-paypal">Payer avec PayPal</span></a>
  <p class="secure"><i class="fas fa-lock"></i> <span data-i18n="secure">PayPal ou carte bancaire · paiement chiffré SSL</span></p>

  <div class="divider"><span data-i18n="or">ou</span></div>

  <!-- VIREMENT — repli -->
  <a id="link-bank" href="bank-transfer-request.html" class="btn btn-bank">
    <i class="fas fa-building-columns"></i> <span data-i18n="btn-bank">Payer par virement bancaire</span>
  </a>

  <a href="/laboratoire" class="back" data-i18n="back">← Retour aux laboratoires</a>
</div>

<script>
/* ===== Compte PayPal (identifiant marchand) — déjà configuré ===== */
var PAYPAL_MERCHANT_ID = "NCN47ZKS6S8AE";
/* ================================================================= */

var i18n={
 fr:{'page-title':'Paiement – Koffi Academy','lab':'Laboratoire','access-note':"Accès unique au contenu du laboratoire (vidéos + environnement).",'paypal-heading':'Paiement sécurisé','btn-paypal':'Payer avec PayPal','secure':'PayPal ou carte bancaire · paiement chiffré SSL','or':'ou','btn-bank':'Payer par virement bancaire','back':'← Retour aux laboratoires'},
 de:{'page-title':'Bezahlung – Koffi Academy','lab':'Labor','access-note':'Einmaliger Zugang zum Lab-Inhalt (Videos + Umgebung).','paypal-heading':'Sichere Zahlung','btn-paypal':'Mit PayPal bezahlen','secure':'PayPal oder Kreditkarte · SSL-verschlüsselt','or':'oder','btn-bank':'Per Banküberweisung zahlen','back':'← Zurück zu den Laboren'},
 en:{'page-title':'Checkout – Koffi Academy','lab':'Lab','access-note':'One-time access to the lab content (videos + environment).','paypal-heading':'Secure payment','btn-paypal':'Pay with PayPal','secure':'PayPal or credit card · SSL encrypted','or':'or','btn-bank':'Pay by bank transfer','back':'← Back to labs'}
};
function setLanguage(l){if(!i18n[l])return;document.querySelectorAll('[data-i18n]').forEach(function(e){var k=e.getAttribute('data-i18n');if(i18n[l][k]!==undefined)e.textContent=i18n[l][k];});document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-lang')===l);});document.documentElement.lang=l;localStorage.setItem('preferred-lang',l);if(i18n[l]['page-title'])document.title=i18n[l]['page-title'];}

var P=new URLSearchParams(location.search);
var COURSE=P.get('course')||'';
var TITLE=P.get('title')?decodeURIComponent(P.get('title')):'Laboratoire';
var PRICE=P.get('price')||'';
var CUR=P.get('currency')||'EUR';
if(!PRICE){var m=parseInt(P.get('min')||'0',10);PRICE=String(m>60?55:30);}

function buildPayPalUrl(){
  var origin=window.location.origin;
  var hasUrl=origin && origin!=='null' && /^https?:/.test(origin);
  var path=window.location.pathname;
  var params={
    cmd:'_xclick',
    business:PAYPAL_MERCHANT_ID,
    item_name:(TITLE+' — Koffi Academy Laboratoire').slice(0,127),
    item_number:COURSE,
    amount:parseFloat(PRICE).toFixed(2),
    currency_code:CUR,
    charset:'UTF-8',
    lc:(localStorage.getItem('preferred-lang')||'de').toUpperCase()
  };
  if(hasUrl){
    var base=origin+path.replace(/checkout\.html$/,'');
    params.return=base+'paypal-success.html?course='+encodeURIComponent(COURSE);
    params.cancel_return=base+'paypal-cancel.html?course='+encodeURIComponent(COURSE);
  }
  return 'https://www.paypal.com/cgi-bin/webscr?'+new URLSearchParams(params).toString();
}

document.addEventListener('DOMContentLoaded',function(){
  setLanguage(localStorage.getItem('preferred-lang')||'de');
  document.getElementById('course-title').textContent=TITLE;
  document.getElementById('course-price').textContent=PRICE;
  document.getElementById('course-currency').textContent=CUR;
  document.getElementById('paypal-btn').href=buildPayPalUrl();
  document.getElementById('link-bank').href='bank-transfer-request.html?course='+encodeURIComponent(COURSE)+'&price='+encodeURIComponent(PRICE)+'&title='+encodeURIComponent(TITLE);
});
</script>
</body>
</html>
