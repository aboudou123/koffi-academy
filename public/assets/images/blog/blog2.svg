<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07294d"/>
      <stop offset="100%" stop-color="#0e3a62"/>
    </linearGradient>
    <pattern id="dots2" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>
  <rect width="300" height="200" fill="url(#bg2)"/>
  <rect width="300" height="200" fill="url(#dots2)"/>
  <circle cx="230" cy="50" r="80" fill="rgba(255,198,0,0.06)"/>
  <!-- Icon: cloud + code -->
  <rect x="20" y="20" width="4" height="160" fill="#ffc600" rx="2" opacity="0.7"/>
  <text x="150" y="95" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="38" fill="rgba(255,255,255,0.12)">⚙</text>
  <text x="150" y="88" text-anchor="middle" font-family="monospace" font-size="28" fill="rgba(255,198,0,0.35)">&lt;/&gt;</text>
  <text x="150" y="130" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" font-weight="600" letter-spacing="2">PLATFORM ENG.</text>
  <text x="290" y="192" text-anchor="end" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.15)">Koffi Academy</text>
</svg>
