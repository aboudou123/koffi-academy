<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#050f1e"/>
    <stop offset="45%" stop-color="#08203a"/>
    <stop offset="100%" stop-color="#0c2e50"/>
  </linearGradient>
  <radialGradient id="teal" cx="700" cy="60" r="320" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#199484" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#199484" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="blue" cx="100" cy="420" r="250" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#0369a1" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#0369a1" stop-opacity="0"/>
  </radialGradient>
  <pattern id="g" width="28" height="28" patternUnits="userSpaceOnUse">
    <path d="M28 0 L0 0 0 28" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <linearGradient id="rfade" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0c2e50" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0c2e50" stop-opacity="0.7"/>
  </linearGradient>
  <linearGradient id="bfade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#050f1e" stop-opacity="0"/>
    <stop offset="100%" stop-color="#050f1e" stop-opacity="0.8"/>
  </linearGradient>
  <clipPath id="clip"><rect width="800" height="450"/></clipPath>
</defs>

<!-- Background -->
<rect width="800" height="450" fill="url(#bg)"/>
<rect width="800" height="450" fill="url(#teal)"/>
<rect width="800" height="450" fill="url(#blue)"/>
<rect width="800" height="450" fill="url(#g)"/>

<!-- ─── RIGHT: Backstage portal wireframe ─── -->
<g clip-path="url(#clip)" opacity="1">

  <!-- Portal outer frame -->
  <rect x="440" y="32" width="360" height="396" rx="10" fill="rgba(10,30,55,0.6)" stroke="rgba(25,148,132,0.25)" stroke-width="1.5"/>

  <!-- Top bar -->
  <rect x="440" y="32" width="360" height="40" rx="10" fill="rgba(25,148,132,0.14)"/>
  <rect x="440" y="62" width="360" height="10" fill="rgba(25,148,132,0.14)"/>

  <!-- Brand in top bar -->
  <circle cx="465" cy="52" r="9" fill="#199484" opacity="0.8"/>
  <text x="480" y="57" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.8)">Backstage</text>

  <!-- Nav items -->
  <rect x="570" y="46" width="38" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="614" y="46" width="50" height="10" rx="3" fill="rgba(25,148,132,0.5)" stroke="#199484" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="670" y="46" width="38" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="714" y="46" width="38" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>
  <circle cx="775" cy="52" r="8" fill="rgba(255,255,255,0.1)"/>

  <!-- Left nav column -->
  <rect x="440" y="72" width="48" height="356" fill="rgba(25,148,132,0.05)" stroke-width="0"/>
  <line x1="488" y1="72" x2="488" y2="428" stroke="rgba(25,148,132,0.15)" stroke-width="1"/>

  <!-- Sidebar icons -->
  <rect x="452" y="90" width="18" height="18" rx="4" fill="#199484" opacity="0.6"/>
  <rect x="452" y="120" width="18" height="18" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="452" y="150" width="18" height="18" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="452" y="180" width="18" height="18" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="452" y="210" width="18" height="18" rx="4" fill="rgba(255,255,255,0.04)"/>
  <rect x="452" y="390" width="18" height="18" rx="4" fill="rgba(255,255,255,0.05)"/>

  <!-- Search bar -->
  <rect x="500" y="84" width="284" height="26" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="512" y="94" width="6" height="6" rx="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="524" y="95" width="70" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>

  <!-- Section heading -->
  <rect x="500" y="126" width="88" height="7" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="596" y="126" width="50" height="7" rx="2" fill="rgba(25,148,132,0.45)"/>
  <rect x="720" y="124" width="48" height="11" rx="5" fill="rgba(25,148,132,0.3)" stroke="#199484" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Card 1 — active/highlighted -->
  <rect x="500" y="148" width="284" height="58" rx="7" fill="rgba(25,148,132,0.16)" stroke="#199484" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="522" cy="169" r="9" fill="#199484" opacity="0.7"/>
  <rect x="538" y="162" width="80" height="7" rx="2" fill="rgba(255,255,255,0.7)"/>
  <rect x="538" y="173" width="55" height="5" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="538" y="182" width="110" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="686" y="161" width="46" height="14" rx="7" fill="#199484" opacity="0.45"/>
  <rect x="686" y="180" width="40" height="12" rx="6" fill="rgba(255,255,255,0.07)"/>

  <!-- Card 2 -->
  <rect x="500" y="217" width="284" height="52" rx="7" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="522" cy="236" r="7" fill="rgba(255,255,255,0.2)"/>
  <rect x="536" y="229" width="65" height="6" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="536" y="239" width="48" height="5" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="536" y="249" width="88" height="4" rx="2" fill="rgba(255,255,255,0.09)"/>
  <rect x="684" y="231" width="42" height="12" rx="6" fill="rgba(255,255,255,0.07)"/>

  <!-- Card 3 -->
  <rect x="500" y="280" width="284" height="52" rx="7" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <circle cx="522" cy="299" r="7" fill="rgba(255,255,255,0.12)"/>
  <rect x="536" y="292" width="78" height="6" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="536" y="302" width="52" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="536" y="312" width="70" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>

  <!-- Card 4 (ghost) -->
  <rect x="500" y="343" width="284" height="52" rx="7" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="522" cy="362" r="7" fill="rgba(255,255,255,0.06)"/>
  <rect x="536" y="355" width="62" height="6" rx="2" fill="rgba(255,255,255,0.13)"/>
  <rect x="536" y="365" width="44" height="5" rx="2" fill="rgba(255,255,255,0.07)"/>

  <!-- Status bar / footer of portal -->
  <rect x="440" y="406" width="360" height="22" rx="0 0 10 10" fill="rgba(25,148,132,0.06)" stroke-width="0"/>
  <circle cx="458" cy="417" r="4" fill="#199484" opacity="0.5"/>
  <rect x="468" y="413" width="50" height="5" rx="2" fill="rgba(255,255,255,0.1)"/>
  <circle cx="538" cy="417" r="4" fill="rgba(255,255,255,0.15)" opacity="0.5"/>
  <rect x="548" y="413" width="38" height="5" rx="2" fill="rgba(255,255,255,0.08)"/>
</g>

<!-- Right and bottom fade overlay -->
<rect x="680" y="0" width="120" height="450" fill="url(#rfade)"/>
<rect x="0" y="360" width="800" height="90" fill="url(#bfade)"/>

<!-- ─── LEFT: Text content ─── -->

<!-- Vertical accent line -->
<rect x="48" y="72" width="2.5" height="290" rx="2" fill="#199484" opacity="0.75"/>

<!-- Label: INTERNAL DEVELOPER PORTAL -->
<text x="68" y="116"
  font-family="system-ui,-apple-system,'Segoe UI',Helvetica,sans-serif"
  font-size="10.5" font-weight="700" letter-spacing="2.8"
  fill="#199484" opacity="0.9">INTERNAL DEVELOPER PORTAL</text>

<!-- Main title line 1 -->
<text x="68" y="172"
  font-family="system-ui,-apple-system,'Segoe UI',Helvetica,sans-serif"
  font-size="46" font-weight="800" letter-spacing="-1.5"
  fill="#ffffff">Leitfaden</text>

<!-- Main title line 2 (teal) -->
<text x="68" y="226"
  font-family="system-ui,-apple-system,'Segoe UI',Helvetica,sans-serif"
  font-size="40" font-weight="800" letter-spacing="-1.2"
  fill="#199484">zur Backstage</text>

<!-- Subtitle -->
<text x="68" y="264"
  font-family="system-ui,-apple-system,'Segoe UI',Helvetica,sans-serif"
  font-size="13.5" font-weight="400" letter-spacing="0.15"
  fill="rgba(255,255,255,0.45)">Service Catalog · Software Templates · TechDocs · Auth</text>

<!-- Separator line -->
<line x1="68" y1="282" x2="370" y2="282" stroke="rgba(25,148,132,0.28)" stroke-width="1"/>

<!-- Tag 1: Fortgeschritten -->
<rect x="68" y="298" width="118" height="26" rx="13" fill="rgba(25,148,132,0.18)" stroke="#199484" stroke-width="1.2" stroke-opacity="0.55"/>
<text x="127" y="315" text-anchor="middle"
  font-family="system-ui,-apple-system,sans-serif"
  font-size="11" font-weight="700" letter-spacing="0.3"
  fill="#199484">Fortgeschritten</text>

<!-- Tag 2: CNCF -->
<rect x="196" y="298" width="55" height="26" rx="13" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
<text x="223.5" y="315" text-anchor="middle"
  font-family="system-ui,-apple-system,sans-serif"
  font-size="11" font-weight="700" letter-spacing="0.4"
  fill="rgba(255,255,255,0.6)">CNCF</text>

<!-- Tag 3: Backstage 101 -->
<rect x="261" y="298" width="92" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
<text x="307" y="315" text-anchor="middle"
  font-family="system-ui,-apple-system,sans-serif"
  font-size="11" font-weight="600" letter-spacing="0.2"
