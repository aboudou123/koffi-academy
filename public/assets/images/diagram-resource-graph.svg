<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" width="800" height="470" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <filter id="nodeShd" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#07294d" flood-opacity="0.13"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffc600"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="470" fill="url(#bgG)" rx="22"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="900" fill="#07294d">Beispiel: Terraform Resource Graph</text>
  <text x="400" y="57" text-anchor="middle" font-size="12" fill="#6B7280">Abhängigkeitsreihenfolge bei terraform apply</text>

  <!-- ═══════════════════════════════════════
       NODE DIMENSIONS: w=164, h=62, rx=14
       ═══════════════════════════════════════ -->

  <!-- ── LEVEL 1: aws_vpc.main (center x=318, y=70) ── -->
  <rect x="318" y="70" width="164" height="62" rx="14" fill="#07294d" filter="url(#nodeShd)"/>
  <rect x="318" y="70" width="164" height="6" rx="14" fill="#1e4d82"/>
  <text x="400" y="97" text-anchor="middle" font-size="12" font-weight="700" fill="#93c5fd">aws_vpc</text>
  <text x="400" y="114" text-anchor="middle" font-size="13" font-weight="900" fill="white">.main</text>

  <!-- ── ARROWS: vpc → level 2 ── -->
  <!-- vpc → subnet -->
  <line x1="360" y1="132" x2="127" y2="188" stroke="#ffc600" stroke-width="2.5" marker-end="url(#arrowHead)"/>
  <!-- vpc → igw -->
  <line x1="400" y1="132" x2="400" y2="188" stroke="#ffc600" stroke-width="2.5" marker-end="url(#arrowHead)"/>
  <!-- vpc → sg -->
  <line x1="440" y1="132" x2="644" y2="188" stroke="#ffc600" stroke-width="2.5" marker-end="url(#arrowHead)"/>

  <!-- ── LEVEL 2: aws_subnet (left, x=45), aws_igw (center, x=318), aws_security_group (right, x=554) ── -->

  <!-- aws_subnet -->
  <rect x="45" y="188" width="164" height="62" rx="14" fill="#1d4ed8" filter="url(#nodeShd)"/>
  <rect x="45" y="188" width="164" height="6" rx="14" fill="#3B82F6"/>
  <text x="127" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#bfdbfe">resource</text>
  <text x="127" y="232" text-anchor="middle" font-size="13" font-weight="900" fill="white">aws_subnet</text>

  <!-- aws_igw (Internet Gateway) -->
  <rect x="318" y="188" width="164" height="62" rx="14" fill="#1d4ed8" filter="url(#nodeShd)"/>
  <rect x="318" y="188" width="164" height="6" rx="14" fill="#3B82F6"/>
  <text x="400" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#bfdbfe">resource</text>
  <text x="400" y="232" text-anchor="middle" font-size="13" font-weight="900" fill="white">aws_igw</text>

  <!-- aws_security_group -->
  <rect x="554" y="188" width="200" height="62" rx="14" fill="#b45309" filter="url(#nodeShd)"/>
  <rect x="554" y="188" width="200" height="6" rx="14" fill="#F59E0B"/>
  <text x="654" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#fde68a">resource</text>
  <text x="654" y="232" text-anchor="middle" font-size="11.5" font-weight="900" fill="white">aws_security_group</text>

  <!-- ── ARROWS: level 2 → level 3 ── -->
  <!-- subnet → route_table -->
  <line x1="127" y1="250" x2="360" y2="308" stroke="#ffc600" stroke-width="2.5" marker-end="url(#arrowHead)"/>
  <!-- igw → route_table -->
  <line x1="400" y1="250" x2="400" y2="308" stroke="#ffc600" stroke-width="2.5" marker-end="url(#arrowHead)"/>
  <!-- sg → instance (direct skip) -->
  <line x1="654" y1="250" x2="450" y2="388" stroke="#ffc600" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>

  <!-- ── LEVEL 3: aws_route_table (center, x=318, y=308) ── -->
  <rect x="318" y="308" width="164" height="62" rx="14" fill="#5b21b6" filter="url(#nodeShd)"/>
  <rect x="318" y="308" width="164" height="6" rx="14" fill="#8B5CF6"/>
  <text x="400" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#ddd6fe">resource</text>
  <text x="400" y="352" text-anchor="middle" font-size="11.5" font-weight="900" fill="white">aws_route_table</text>

  <!-- ── ARROW: route_table → instance ── -->
  <line x1="400" y1="370" x2="400" y2="396" stroke="#ffc600" stroke-width="2.5" marker-end="url(#arrowHead)"/>

  <!-- ── LEVEL 4: aws_instance (center, x=318, y=396) ── -->
  <rect x="280" y="396" width="240" height="62" rx="14" fill="#065f46" filter="url(#nodeShd)"/>
  <rect x="280" y="396" width="240" height="6" rx="14" fill="#10B981"/>
  <text x="400" y="423" text-anchor="middle" font-size="12" font-weight="700" fill="#a7f3d0">resource</text>
  <text x="400" y="440" text-anchor="middle" font-size="13" font-weight="900" fill="white">aws_instance</text>

  <!-- ── LEGEND ── -->
  <rect x="28" y="398" width="220" height="60" rx="12" fill="white" fill-opacity="0.85" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="44" y1="418" x2="80" y2="418" stroke="#ffc600" stroke-width="2.5" marker-end="url(#arrowHead)"/>
  <text x="88" y="422" font-size="11.5" fill="#374151">Direkte Abhängigkeit</text>
  <line x1="44" y1="443" x2="80" y2="443" stroke="#ffc600" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <text x="88" y="447" font-size="11.5" fill="#374151">Indirekte Abhängigkeit</text>
</svg>
