<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgc3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#041424"/>
      <stop offset="100%" stop-color="#07294d"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bgc3)"/>
  <pattern id="dotsC3" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.05)"/>
  </pattern>
  <rect width="600" height="400" fill="url(#dotsC3)"/>
  <circle cx="500" cy="100" r="180" fill="rgba(255,198,0,0.05)"/>

  <!-- Chat bubble icon (consulting) -->
  <rect x="200" y="120" width="200" height="130" rx="16" fill="none" stroke="#ffc600" stroke-width="2.5" opacity="0.7"/>
  <polygon points="240,250 240,280 270,250" fill="rgba(255,198,0,0.4)" stroke="#ffc600" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>
  <!-- Dots inside bubble -->
  <circle cx="265" cy="185" r="8" fill="rgba(255,198,0,0.45)"/>
  <circle cx="300" cy="185" r="8" fill="rgba(255,198,0,0.35)"/>
  <circle cx="335" cy="185" r="8" fill="rgba(255,198,0,0.25)"/>

  <text x="300" y="315" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.6)" letter-spacing="2">BERATUNG</text>
  <text x="300" y="340" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="12" fill="rgba(255,198,0,0.5)">Koffi Academy</text>
</svg>
