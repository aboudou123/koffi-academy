  <line x1="410" y1="155" x2="410" y2="200" stroke="#ffc600" stroke-width="2" opacity="0.6"/>

  <text x="300" y="290" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.6)" letter-spacing="2">KURSE &amp; ZERTIFIKATE</text>
  <text x="300" y="315" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="12" fill="rgba(255,198,0,0.5)">Koffi Academy</text>
