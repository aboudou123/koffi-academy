      <stop offset="0%" stop-color="#07294d"/>
      <stop offset="100%" stop-color="#0e4a7a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bgc1)"/>
  <!-- Grid dots -->
